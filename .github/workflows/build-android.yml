name: Build Android APK (Capacitor/Legacy)

on:
  push:
    branches: [ "main" ]
    paths:
      - 'android/**'
      - 'frontend/**'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK (with version)
        run: |
          cd android
          ./gradlew assembleDebug \
            -PversionCode=${{ github.run_number }} \
            -PversionName="1.${{ github.run_number }}" \
            --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: korneo-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "v${{ github.run_number }}"
          name: "Korneo v1.${{ github.run_number }}"
          body: |
            📱 Автосборка APK v1.${{ github.run_number }}
            **Установка:**
            1. Скачай `app-debug.apk`
            2. Настройки → Безопасность → Разрешить установку из неизвестных источников
            3. Открой и установи
          files: android/app/build/outputs/apk/debug/app-debug.apk
          token: ${{ secrets.GITHUB_TOKEN }}
