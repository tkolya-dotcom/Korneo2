name: Build Korneo Android APK (Native Gradle)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g expo-cli @expo/cli

      - name: Create .env for build
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          echo iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAADUlEQVR42mNk+M9QDwADhgGAWjR9awAAAABJRU5ErkJggg== | base64 -d > assets/icon.png
          cp assets/icon.png assets/adaptive-icon.png
          cp assets/icon.png assets/splash.png
          cp assets/icon.png assets/favicon.png

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean --no-install

      - name: Patch gradle.properties for Kotlin compatibility
        run: |
          echo "kotlinVersion=1.9.25" >> android/gradle.properties
                    echo "android.kotlinVersion=1.9.25" >> android/gradle.properties
          echo "android.suppressKotlinVersionCompatibilityCheck=true" >> android/gradle.properties
          echo "org.jetbrains.kotlin.android.suppressGradlePluginCompatibility=true" >> android/gradle.properties

      - name: Patch Kotlin version in build.gradle files
        run: |
          # Patch root build.gradle
          if [ -f android/build.gradle ]; then
            sed -i 's/kotlinVersion = "[0-9.]*"/kotlinVersion = "1.9.25"/g' android/build.gradle
            sed -i 's/kotlin_version = "[0-9.]*"/kotlin_version = "1.9.25"/g' android/build.gradle
            sed -i "s/ext.kotlin_version = '[0-9.]*'/ext.kotlin_version = '1.9.25'/g" android/build.gradle
            sed -i 's/id "org.jetbrains.kotlin.android" version "[0-9.]*"/id "org.jetbrains.kotlin.android" version "1.9.25"/g' android/build.gradle
          fi
          # Patch settings.gradle if present
          if [ -f android/settings.gradle ]; then
            sed -i 's/id("org.jetbrains.kotlin.android") version "[0-9.]*"/id("org.jetbrains.kotlin.android") version "1.9.25"/g' android/settings.gradle
          fi
          echo "=== Kotlin references found ==="
          grep -rn "kotlin" android/build.gradle || true

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Debug APK
        run: |
          cd android
          ./gradlew assembleDebug \
            -PversionCode=${{ github.run_number }} \
            -PversionName=2.${{ github.run_number }} \
            --no-daemon \
            --stacktrace

      - name: Rename APK
        run: |
          mkdir -p output
          cp android/app/build/outputs/apk/debug/app-debug.apk output/korneo-v2.${{ github.run_number }}.apk

      - name: Write version.json
        working-directory: ${{ github.workspace }}
        run: |
          cat > version.json << 'EOF'
          {
            "versionCode": ${{ github.run_number }},
            "versionName": "2.${{ github.run_number }}",
            "downloadUrl": "https://github.com/tkolya-dotcom/Korneo2/releases/download/v2.${{ github.run_number }}/korneo-v2.${{ github.run_number }}.apk",
            "releaseNotes": "Native Expo build v2.${{ github.run_number }}"
          }
          EOF

      - name: Commit version.json
        working-directory: ${{ github.workspace }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          git diff --staged --quiet || git commit -m "chore: version ${{ github.run_number }}"
          git push

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: korneo-debug-apk
          path: apps/mobile/output/korneo-v2.${{ github.run_number }}.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v2.${{ github.run_number }}
          name: Korneo v2.${{ github.run_number }}
          body: |
            ## Korneo Native App v2.${{ github.run_number }}

            Нативное Android приложение собранное из Expo React Native.

            ### Установка:
            1. Скачай `korneo-v2.${{ github.run_number }}.apk`
            2. Настройки → Безопасность → Разрешить установку из неизвестных источников
            3. Открой и установи

            ### Изменения:
          files: apps/mobile/output/korneo-v2.${{ github.run_number }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}