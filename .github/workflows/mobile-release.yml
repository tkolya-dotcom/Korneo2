name: Build Korneo Mobile APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-release.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Expo Prebuild (generate android/)
        run: npx expo prebuild --platform android --clean
        env:
          NODE_ENV: production

      - name: Patch PermissionsService.kt (null-safety fix)
        run: |
          FILE=$(find . -path "*/expo-modules-core/android/src/main/java/expo/modules/adapters/react/permissions/PermissionsService.kt" | head -1)
          if [ -n "$FILE" ]; then
            echo "=== Lines 160-172 of PermissionsService.kt ==="
            sed -n '160,172p' "$FILE"
            echo "=== Applying patch ==="
            python3 -c "
import re, sys
content = open('$FILE').read()
# Fix: grantResults is nullable IntArray, replace .contains with ?.contains  
content = re.sub(r'(\bgrantResults\b)(\.[a-zA-Z])', r'\\1?.\\2', content)
open('$FILE', 'w').write(content)
print('Patched successfully')
"
          else
            echo "PermissionsService.kt not found"
          fi

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: cd android && ./gradlew assembleRelease --no-daemon -Pkotlin.incremental=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: korneo-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: mobile-v${{ github.run_number }}
          name: Korneo Mobile APK v${{ github.run_number }}
          files: apps/mobile/android/app/build/outputs/apk/release/app-release*.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
