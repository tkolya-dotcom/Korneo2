name: Build Korneo Mobile APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-release.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}
  EXPO_PUBLIC_REVENUECAT_IOS_API_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_IOS_API_KEY }}
  EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY: ${{ secrets.EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY }}
  EXPO_PUBLIC_REVENUECAT_ENTITLEMENT_ID: ${{ secrets.EXPO_PUBLIC_REVENUECAT_ENTITLEMENT_ID }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android 35 SDK packages
        run: |
          yes | sdkmanager --licenses > /dev/null || true
          sdkmanager \
            "platform-tools" \
            "platforms;android-35" \
            "build-tools;35.0.0"

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Typecheck mobile app
        working-directory: apps/mobile
        run: npm run typecheck

      - name: Create .env file
        working-directory: apps/mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo "EXPO_PUBLIC_REVENUECAT_IOS_API_KEY=${{ secrets.EXPO_PUBLIC_REVENUECAT_IOS_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY=${{ secrets.EXPO_PUBLIC_REVENUECAT_ANDROID_API_KEY }}" >> .env
          echo "EXPO_PUBLIC_REVENUECAT_ENTITLEMENT_ID=${{ secrets.EXPO_PUBLIC_REVENUECAT_ENTITLEMENT_ID }}" >> .env

      - name: Expo Prebuild (generate android/)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean
        env:
          NODE_ENV: production
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Create local.properties
        working-directory: apps/mobile
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Patch Kotlin version in android/build.gradle
        working-directory: apps/mobile
        run: |
          sed -i 's/kotlinVersion = .*/kotlinVersion = "1.9.25"/' android/build.gradle || true
          grep 'kotlinVersion' android/build.gradle || true

      - name: Patch PermissionsService.kt (fix requestedPermissions null-safety)
        run: |
          FILE=$(find . -name "PermissionsService.kt" 2>/dev/null | grep -v '.cxx' | head -1)
          if [ -n "$FILE" ]; then
            echo "Found: $FILE"
            sed -i 's/requestedPermissions\.contains(permission)/requestedPermissions?.contains(permission) ?: false/g' "$FILE"
            sed -i 's/parseNativeResult(receivePermissions, grantResults)/parseNativeResult(receivePermissions ?: emptyArray(), grantResults)/g' "$FILE"
            sed -i 's/grantResults\.forEach/grantResults?.forEach/g' "$FILE"
            echo "Patches applied successfully"
          else
            echo "PermissionsService.kt not found, skipping patch"
          fi

      - name: Make gradlew executable
        working-directory: apps/mobile
        run: chmod +x android/gradlew

      - name: Build Release APK (unsigned)
        working-directory: apps/mobile
        run: |
          set -o pipefail
          cd android
          ./gradlew assembleRelease --no-daemon -Pkotlin.incremental=false --stacktrace --info 2>&1 | tee ../android-release-build.log
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Upload Android build log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-release-build-log
          path: apps/mobile/android-release-build.log
          retention-days: 30

      - name: Collect release APK
        run: |
          echo "APK files under outputs:"
          find apps/mobile/android/app/build/outputs -type f | sort || true
          APK_PATH=$(find apps/mobile/android/app/build/outputs -type f -name "*.apk" -print -quit)
          if [ -z "$APK_PATH" ]; then
            echo "ERROR: No release APK found"
            find apps/mobile/android/app/build/outputs -maxdepth 4 -type f | sort
            exit 1
          fi
          echo "Using APK: $APK_PATH"
          cp "$APK_PATH" korneo-release.apk
          ls -lh korneo-release.apk

      - name: Upload Android outputs snapshot
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: android-build-outputs
          path: apps/mobile/android/app/build/outputs
          retention-days: 30

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: korneo-release-apk
          path: korneo-release.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: mobile-v${{ github.run_number }}
          name: Korneo Mobile APK v${{ github.run_number }}
          files: korneo-release.apk
          body: |
            ## Korneo Android APK v${{ github.run_number }}

            ### Установка на Android:
            1. Скачайте `korneo-release-signed.apk`
            2. Откройте файл на телефоне
            3. Разрешите установку из неизвестных источников
            4. Нажмите "Установить"
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
