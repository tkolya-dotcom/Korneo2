name: Build Korneo Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: temurin

      - uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install

      - name: Install Expo CLI
        run: npm install -g @expo/cli

      - name: Create placeholder assets
        run: |
          mkdir -p assets
          convert -size 1024x1024 xc:'#0f172a' assets/icon.png
          convert -size 1024x1024 xc:'#0f172a' assets/adaptive-icon.png
          convert -size 1284x2778 xc:'#0f172a' assets/splash.png

      - name: Expo Prebuild
        run: npx expo prebuild --platform android --clean

      - name: Build APK
        run: |
          chmod +x android/gradlew
          cd android && ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        id: apk
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          mkdir -p ../../artifacts
          cp android/app/build/outputs/apk/release/app-release.apk \
             ../../artifacts/korneo-v${VERSION}.apk
          echo '{"version":"'$VERSION'","build":${{ github.run_number }},"date":"'$(date -u +%Y-%m-%dT%H:%M:%SZ)'"}' \
             > ../../artifacts/version.json

      - name: Commit artifacts
        run: |
          git config user.email "actions@github.com"
          git config user.name "GitHub Actions"
          git add ../../artifacts/
          git diff --staged --quiet || git commit -m "chore: release v${{ steps.apk.outputs.version }} [skip ci]"
          git push
        working-directory: apps/mobile
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/upload-artifact@v4
        with:
          name: korneo-apk-v${{ steps.apk.outputs.version }}
          path: artifacts/korneo-v${{ steps.apk.outputs.version }}.apk

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.apk.outputs.version }}-build${{ github.run_number }}
          name: Korneo v${{ steps.apk.outputs.version }} (build ${{ github.run_number }})
          files: artifacts/korneo-v${{ steps.apk.outputs.version }}.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}