name: Build Korneo Mobile APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-release.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/mobile

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/mobile/package-lock.json

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Create .env file
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Expo Prebuild (generate android/)
        run: npx expo prebuild --platform android --clean --no-install
        env:
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Set version in build.gradle
        run: |
          sed -i "s/versionCode 1/versionCode ${{ github.run_number }}/" android/app/build.gradle
          sed -i "s/versionName \"1.0\"/versionName \"1.${{ github.run_number }}\"/" android/app/build.gradle

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Build Release APK
        run: |
          cd android
          ./gradlew assembleRelease \
            -PversionCode=${{ github.run_number }} \
            -PversionName="1.${{ github.run_number }}" \
            --no-daemon

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: korneo-mobile-apk-${{ github.run_number }}
          path: apps/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "mobile-v1.${{ github.run_number }}"
          name: "Korneo Mobile v1.${{ github.run_number }}"
          body: |
            ## Korneo Mobile v1.${{ github.run_number }}

            Автоматическая сборка из ветки `main`.

            ### Установка на Android:
            1. Скачай `app-release-unsigned.apk`
            2. Настройки → Безопасность → Разрешить установку из неизвестных источников
            3. Открой файл и установи

            ### Сборка: `${{ github.sha }}`
          files: apps/mobile/android/app/build/outputs/apk/release/app-release-unsigned.apk
          token: ${{ secrets.GITHUB_TOKEN }}
