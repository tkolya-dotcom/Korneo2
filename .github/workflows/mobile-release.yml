name: Build Korneo Mobile APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-release.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Create .env file
        working-directory: apps/mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env
          echo ".env file contents:"
          cat .env

      - name: Expo Prebuild (generate android/)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean
        env:
          NODE_ENV: production
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Create local.properties
        working-directory: apps/mobile
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Patch Kotlin version in android/build.gradle
        working-directory: apps/mobile
        run: |
          sed -i 's/kotlinVersion = .*/kotlinVersion = "1.9.25"/' android/build.gradle || true
          grep 'kotlinVersion' android/build.gradle || true

      - name: Patch PermissionsService.kt (fix requestedPermissions null-safety)
        run: |
          FILE=$(find . -name "PermissionsService.kt" 2>/dev/null | grep -v '.cxx' | head -1)
          if [ -n "$FILE" ]; then
            echo "Found: $FILE"
            sed -i 's/requestedPermissions\.contains(permission)/requestedPermissions?.contains(permission) ?: false/g' "$FILE"
            sed -i 's/parseNativeResult(receivePermissions, grantResults)/parseNativeResult(receivePermissions ?: emptyArray(), grantResults)/g' "$FILE"
            sed -i 's/grantResults\.forEach/grantResults?.forEach/g' "$FILE"
            echo "Patches applied successfully"
          else
            echo "PermissionsService.kt not found, skipping patch"
          fi

      - name: Make gradlew executable
        working-directory: apps/mobile
        run: chmod +x android/gradlew

      - name: Build Release APK (unsigned)
        working-directory: apps/mobile
        run: cd android && ./gradlew assembleRelease --no-daemon -Pkotlin.incremental=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"
          EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
          EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

      - name: Generate signing keystore
        run: |
          keytool -genkeypair \
            -keystore korneo-release.keystore \
            -alias korneo \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass korneo123 \
            -keypass korneo123 \
            -dname "CN=Korneo, OU=Mobile, O=Korneo, L=SPb, ST=SPb, C=RU" \
            -noprompt

      - name: Align and sign APK
        run: |
          APK_UNSIGNED=$(find apps/mobile/android/app/build/outputs/apk/release -name "app-release-unsigned.apk" | head -1)
          if [ -z "$APK_UNSIGNED" ]; then
            APK_UNSIGNED=$(find apps/mobile/android/app/build/outputs/apk/release -name "*.apk" | head -1)
          fi
          echo "Signing: $APK_UNSIGNED"
          $ANDROID_SDK_ROOT/build-tools/35.0.0/zipalign -v -p 4 "$APK_UNSIGNED" korneo-aligned.apk
          $ANDROID_SDK_ROOT/build-tools/35.0.0/apksigner sign \
            --ks korneo-release.keystore \
            --ks-key-alias korneo \
            --ks-pass pass:korneo123 \
            --key-pass pass:korneo123 \
            --out korneo-release-signed.apk \
            korneo-aligned.apk
          echo "APK signed successfully"
          ls -lh korneo-release-signed.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: korneo-release-apk
          path: korneo-release-signed.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: mobile-v${{ github.run_number }}
          name: Korneo Mobile APK v${{ github.run_number }}
          files: korneo-release-signed.apk
          body: |
            ## Korneo Android APK v${{ github.run_number }}

            ### Установка на Android:
            1. Скачайте `korneo-release-signed.apk`
            2. Откройте файл на телефоне
            3. Разрешите установку из неизвестных источников
            4. Нажмите "Установить"
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
