name: Build Korneo Mobile APK

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/mobile-release.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Create .env file
        working-directory: apps/mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Expo Prebuild (generate android/)
        working-directory: apps/mobile
        run: npx expo prebuild --platform android --clean
        env:
          NODE_ENV: production

      - name: Create local.properties
        working-directory: apps/mobile
        run: echo "sdk.dir=$ANDROID_SDK_ROOT" > android/local.properties

      - name: Patch Kotlin version in android/build.gradle
        working-directory: apps/mobile
        run: |
          sed -i 's/kotlinVersion = .*/kotlinVersion = "1.9.25"/' android/build.gradle || true
          echo "Current kotlinVersion:"
          grep 'kotlinVersion' android/build.gradle || true

      - name: Patch PermissionsService.kt (fix null-safety errors)
        run: |
          FILE=$(find apps/mobile/node_modules/expo-modules-core -name "PermissionsService.kt" 2>/dev/null | head -1)
          if [ -n "$FILE" ]; then
            echo "Found: $FILE"
            # Fix line: parseNativeResult(receivePermissions, grantResults)
            sed -i 's/parseNativeResult(receivePermissions, grantResults)/parseNativeResult(receivePermissions ?: emptyArray(), grantResults)/g' "$FILE"
            # Fix any other nullable receiver calls (add ?: emptyArray() for array params)
            sed -i 's/grantResults\.forEach/grantResults?.forEach/g' "$FILE"
            sed -i 's/grantResults\.map/grantResults?.map/g' "$FILE"
            sed -i 's/grantResults\.size/grantResults?.size ?: 0/g' "$FILE"
            sed -i 's/grantResults\.isEmpty/grantResults?.isEmpty/g' "$FILE"
            echo "Patches applied"
            echo "--- Line 160-175 of patched file:"
            sed -n '160,175p' "$FILE"
          else
            echo "PermissionsService.kt not found - listing expo-modules-core:"
            find apps/mobile/node_modules/expo-modules-core -name "*.kt" 2>/dev/null | head -20
          fi

      - name: Make gradlew executable
        working-directory: apps/mobile
        run: chmod +x android/gradlew

      - name: Build Release APK
        working-directory: apps/mobile
        run: cd android && ./gradlew assembleRelease --no-daemon -Pkotlin.incremental=false
        env:
          GRADLE_OPTS: "-Dorg.gradle.jvmargs=-Xmx4g -Dorg.gradle.daemon=false"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: korneo-release-apk
          path: apps/mobile/android/app/build/outputs/apk/release/app-release*.apk
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: mobile-v${{ github.run_number }}
          name: Korneo Mobile APK v${{ github.run_number }}
          files: apps/mobile/android/app/build/outputs/apk/release/app-release*.apk
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
