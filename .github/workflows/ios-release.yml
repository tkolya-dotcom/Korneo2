name: Build Korneo iOS IPA

on:
  push:
    branches: [main]
    paths:
      - 'apps/mobile/**'
      - '.github/workflows/ios-release.yml'
  workflow_dispatch:

permissions:
  contents: write

env:
  EXPO_PUBLIC_SUPABASE_URL: ${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}
  EXPO_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}

jobs:
  build-ios:
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: apps/mobile
        run: npm install

      - name: Create .env file
        working-directory: apps/mobile
        run: |
          echo "EXPO_PUBLIC_SUPABASE_URL=${{ secrets.EXPO_PUBLIC_SUPABASE_URL }}" > .env
          echo "EXPO_PUBLIC_SUPABASE_ANON_KEY=${{ secrets.EXPO_PUBLIC_SUPABASE_ANON_KEY }}" >> .env

      - name: Expo Prebuild (generate ios/)
        working-directory: apps/mobile
        run: npx expo prebuild --platform ios --clean
        env:
          NODE_ENV: production

      - name: Install CocoaPods
        working-directory: apps/mobile/ios
        run: pod install

      - name: Detect workspace and scheme
        id: detect
        working-directory: apps/mobile/ios
        run: |
          WORKSPACE=$(find . -name "*.xcworkspace" -maxdepth 1 | head -1 | xargs basename)
          SCHEME=$(echo "$WORKSPACE" | sed 's/.xcworkspace//')
          echo "workspace=$WORKSPACE" >> $GITHUB_OUTPUT
          echo "scheme=$SCHEME" >> $GITHUB_OUTPUT
          echo "Workspace: $WORKSPACE | Scheme: $SCHEME"

      - name: Build iOS Archive (unsigned)
        working-directory: apps/mobile/ios
        run: |
          xcodebuild \
            -workspace "${{ steps.detect.outputs.workspace }}" \
            -scheme "${{ steps.detect.outputs.scheme }}" \
            -configuration Release \
            -sdk iphoneos \
            -archivePath $RUNNER_TEMP/Korneo.xcarchive \
            archive \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            DEVELOPMENT_TEAM="" \
                        SKIP_BUNDLING=1 \
            | xcpretty --color

      - name: Package IPA from archive
        run: |
          ARCHIVE="$RUNNER_TEMP/Korneo.xcarchive"
          IPA_DIR="$RUNNER_TEMP/ipa"
          mkdir -p "$IPA_DIR/Payload"
          APP_PATH=$(find "$ARCHIVE/Products/Applications" -name "*.app" | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app found in archive!"
            find "$ARCHIVE" -type d | head -20
            exit 1
          fi
          echo "Found .app: $APP_PATH"
          cp -r "$APP_PATH" "$IPA_DIR/Payload/"
          cd "$IPA_DIR"
          zip -r Korneo-unsigned.ipa Payload
          ls -lh Korneo-unsigned.ipa

      - name: Upload IPA artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: korneo-ios-ipa
          path: ${{ runner.temp }}/ipa/Korneo-unsigned.ipa
          retention-days: 30

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: success()
        with:
          tag_name: ios-v${{ github.run_number }}
          name: Korneo iOS IPA v${{ github.run_number }}
          files: ${{ runner.temp }}/ipa/Korneo-unsigned.ipa
          body: |
            ## Korneo iOS (Unsigned IPA) v${{ github.run_number }}
            Unsigned IPA — для установки через AltStore / Sideloadly / ESign.
          generate_release_notes: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
