        function initUserGeolocation() {
            if (!navigator.geolocation) return;
            
            // Создаём элемент маркера пользователя
            const el = document.createElement('div');
            el.className = 'user-own-marker';
            el.style.cssText = 'width:20px;height:20px;background:#00D9FF;border-radius:50%;border:3px solid #fff;box-shadow:0 0 15px #00D9FF;';
            
            // Функция обновления позиции
            const updatePosition = (lng, lat) => {
                window._userLocation = { lng, lat };
                
                // Сохраняем в localStorage для восстановления после перезагрузки
                localStorage.setItem('lastUserLocation', JSON.stringify({ lng, lat, timestamp: Date.now() }));
                
                // Создаём или обновляем маркер
                if (!window._ownMarker && mapboxMap) {
                    window._ownMarker = new mapboxgl.Marker(el)
                        .setLngLat([lng, lat])
                        .setPopup(new mapboxgl.Popup().setHTML('<strong>📍 Вы здесь</strong>'))
                        .addTo(mapboxMap);
                } else if (window._ownMarker) {
                    window._ownMarker.setLngLat([lng, lat]);
                }
                
                broadcastLocation();
            };
            
            // Восстанавливаем последнюю известную позицию
            try {
                const savedLoc = localStorage.getItem('lastUserLocation');
                if (savedLoc) {
                    const { lng, lat, timestamp } = JSON.parse(savedLoc);
                    // Используем если не старше 1 часа
                    if (Date.now() - timestamp < 3600000) {
                        window._userLocation = { lng, lat };
                        if (mapboxMap) {
                            window._ownMarker = new mapboxgl.Marker(el)
                                .setLngLat([lng, lat])
                                .setPopup(new mapboxgl.Popup().setHTML('<strong>📍 Вы здесь (последняя)</strong>'))
                                .addTo(mapboxMap);
                        }
                    }
                }
            } catch (e) {}
            
            // Первый запрос
            navigator.geolocation.getCurrentPosition(
                (pos) => {
                    const { longitude, latitude } = pos.coords;
                    updatePosition(longitude, latitude);
                    // Центрируем карту на пользователе
                    if (mapboxMap) mapboxMap.flyTo({ center: [longitude, latitude], zoom: 13 });
                },
                (err) => console.log('Geolocation error:', err),
                { enableHighAccuracy: true, timeout: 10000 }
            );
            
            // Обновляем позицию каждые 10 секунд
            window._locationInterval = setInterval(() => {
                navigator.geolocation.getCurrentPosition(
                    (pos) => updatePosition(pos.coords.longitude, pos.coords.latitude),
                    () => {},
                    { enableHighAccuracy: true, timeout: 5000, maximumAge: 3000 }
                );
            }, 10000);
            
            // Следим за позицией в реальном времени (watchPosition)
            window._watchId = navigator.geolocation.watchPosition(
                (pos) => updatePosition(pos.coords.longitude, pos.coords.latitude),
                () => {},
                { enableHighAccuracy: true, timeout: 5000, maximumAge: 3000 }
            );
        }

        // Проверяет нужно ли скрыть работу с основной карты (в архив >24ч или до 6 утра)
        function shouldHideJobFromMap(job) {
            if (job.status !== 'done') return false; // Только завершённые скрываем
            
            const finishedAt = job.finished_at ? new Date(job.finished_at) : null;
            if (!finishedAt) return false;
            
            const now = new Date();
            const hoursSinceFinish = (now - finishedAt) / (1000 * 60 * 60);
            
            // Скрываем если прошло больше 24 часов с момента завершения
            if (hoursSinceFinish >= 24) return true;
            
            // Или если сейчас после 6 утра, а работа была завершена до 6 утра
            const currentHour = now.getHours();
            const finishedHour = finishedAt.getHours();
            const isSameDay = now.toDateString() === finishedAt.toDateString();
            
            if (currentHour >= 6 && (finishedHour < 6 || !isSameDay)) {
                return true;
            }
            
            return false;
        }
        
        // Фильтруем работы для основной карты (без архивных)
        function getActiveMapJobs() {
            return (window._mapJobs || []).filter(j => {
                if (!j.lat || !j.lng) return false;
                return !shouldHideJobFromMap(j);
            });
        }
        
        // Получить архивные работы для отображения по запросу
        window.getArchivedMapJobs = function() {
            return (window._mapJobs || []).filter(j => {
                if (!j.lat || !j.lng) return false;
                return shouldHideJobFromMap(j);
            });
        };

        function drawMapJobs() {
            if (!mapboxMap) return;
            const filter = window._mapFilter || 'all';
            
            // Получаем активные работы
            let jobs = getActiveMapJobs();
            
            // Добавляем архивные если включено отображение
            if (window.showArchivedOnMap) {

        window.subscribeToUserLocations = function() {
            if (window._locationSub) window._locationSub.unsubscribe();
            window._locationMarkers = window._locationMarkers || {};
            window._locationSub = supabaseClient.channel('user-locations')
                .on('broadcast', { event: 'location' }, (msg) => {
                    const { payload } = msg;
                    if (!payload || payload.user_id === currentUser.id) return;
                    // Обновляем или создаём маркер для другого пользователя
                    const markerId = 'user-' + payload.user_id;
                    if (window._locationMarkers[markerId]) {
                        window._locationMarkers[markerId].setLngLat([payload.lng, payload.lat]);
                    } else if (mapboxMap) {
                        const el = document.createElement('div');
                        el.className = 'user-location-marker';
                        el.style.cssText = 'width:16px;height:16px;background:#00FF88;border-radius:50%;border:2px solid #fff;box-shadow:0 0 10px #00FF88;';

                            .setLngLat([payload.lng, payload.lat])
                            .setPopup(new mapboxgl.Popup().setHTML('<strong>' + payload.name + '</strong>'))
                            .addTo(mapboxMap);
                    }
                })
                .subscribe();

        // Realtime обновления работ
        window.subscribeToJobsRealtime = function() {
            if (window._jobsSub) {
                window._jobsSub.unsubscribe();
            }
            
            window._jobsSub = supabaseClient.channel('jobs-changes')
                .on('postgres_changes', 
                    { 
                        event: '*', 
                        schema: 'public', 
                        table: 'jobs' 
                    }, 
                    (payload) => {
                        console.log('🔵 Jobs realtime change:', payload);
                        
                        // Обновляем кэш
                        if (payload.eventType === 'INSERT') {
                            window._mapJobs = [...(window._mapJobs || []), payload.new];
                        } else if (payload.eventType === 'UPDATE') {
                            window._mapJobs = (window._mapJobs || []).map(j => 
                                j.id === payload.new.id ? payload.new : j
                            );
                        } else if (payload.eventType === 'DELETE') {
                            window._mapJobs = (window._mapJobs || []).filter(j => 
                                j.id !== payload.old.id
                            );
                        }
                        
                        // Перерисовываем карту если она открыта
                        if (mapboxMap && typeof drawMapJobs === 'function') {
                            drawMapJobs();
                        }
                        
                        // Если открыта аналитика - обновляем её
                        const analyticsScreen = document.getElementById('analytics-screen');
                        if (analyticsScreen && messengerState.selectedTab === 'analytics') {
                            renderAnalyticsScreen(analyticsScreen);
                        }

                .subscribe();

        };

        async function renderAnalyticsScreen(container) {
            container.innerHTML = [
                '<div class="analytics-screen" id="analytics-screen">',
                '  <div style="display:flex;gap:8px;margin-bottom:16px;">',
                '    <button onclick="goBackToChats()" style="background:var(--secondary);color:var(--text);border:1px solid var(--border);padding:8px 12px;border-radius:8px;font-size:13px;">← Чаты</button>',
                '  </div>',
                '  <div class="chat-loading">Загрузка...</div>',
                '</div>'
            ].join('');
            try {
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                console.log('📊 Loading analytics jobs...');
                const { data: jobs, error } = await supabaseClient
                    .from('jobs')
                    .select('id, status, started_at, finished_at, engineer_id, engineer:engineer_id(name)');
                
                if (error) {
                    console.error('Analytics jobs error:', error);
                    throw error;
                }
                
                console.log('📊 Loaded', jobs?.length || 0, 'jobs for analytics');

                const all = jobs || [];
                const todayJobs = all.filter(j => j.started_at && new Date(j.started_at) >= today);
                const doneTodayCount = todayJobs.filter(j => j.status === 'done').length;
                const activeTodayCount = todayJobs.filter(j => j.status === 'active').length;

                // Group by engineer
                const engMap = {};
                all.forEach(j => {
                    const name = j.engineer?.name || 'Неизвестно';
                    if (!engMap[name]) engMap[name] = { total: 0, done: 0, totalTime: 0, timeCount: 0 };
                    engMap[name].total++;
                    if (j.status === 'done') {
                        engMap[name].done++;
                        if (j.started_at && j.finished_at) {
                            const diff = (new Date(j.finished_at) - new Date(j.started_at)) / 3600000;
                            engMap[name].totalTime += diff;
                            engMap[name].timeCount++;
                        }
                    }
                });

                const screen = document.getElementById('analytics-screen');
                screen.innerHTML = [
                    '<div class="analytics-card">',
                    '  <h4>📅 Сегодня</h4>',
                    '  <div class="analytics-stat"><span>✅ Завершено</span><span class="stat-val" style="color:#10B981">' + doneTodayCount + '</span></div>',
                    '  <div class="analytics-stat"><span>🟡 В работе</span><span class="stat-val" style="color:#F59E0B">' + activeTodayCount + '</span></div>',
                    '</div>',
                    '<div class="analytics-card">',
                    '  <h4>👷 По инженерам</h4>',
                    Object.entries(engMap).sort((a,b) => b[1].done - a[1].done).map(([name, e]) => {
                        const avg = e.timeCount > 0 ? (e.totalTime / e.timeCount).toFixed(1) : '-';
                        return [
                            '<div class="analytics-stat">',
                            '  <div><div style="font-weight:600;color:#fff">' + name + '</div>',
                            '  <div style="font-size:11px;color:var(--text-muted)">✅ ' + e.done + ' задач' + (avg !== '-' ? ' · ⏱ ' + avg + 'ч ср.' : '') + '</div></div>',
                            '  <span class="stat-val">' + e.total + '</span>',
                            '</div>'
                        ].join('');
                    }).join(''),
                    '</div>'
                ].join('');
            } catch (err) {
                console.error('Analytics error:', err);
                document.getElementById('analytics-screen').innerHTML = '<div class="chat-loading">Ошибка загрузки</div>';
            }
        }

        window.confirmCreateChat = async function() {
            const type = window._newChatType || 'private';
            const checked = [...document.querySelectorAll('#newChatModal input[type=checkbox]:checked')];

            if (!checked.length) {
                showToast('Выберите хотя бы одного пользователя');
                return;
            }

            if (type === 'private') {
                if (checked.length > 1) {
                    showToast('Для личного чата выберите одного пользователя');
                    return;
                }
                const userId = checked[0].value;
                const userName = checked[0].dataset.name;
                document.getElementById('newChatModal')?.remove();
                await createPrivateChat(userId, userName);
            } else {
                const groupName = document.getElementById('groupChatName').value.trim();
                if (!groupName) {
                    showToast('Введите название группы');
                    return;
                }
                const memberIds = checked.map(c => c.value);
                document.getElementById('newChatModal')?.remove();
                await createGroupChat(groupName, memberIds);
            }

                const { data: chatId, error } = await supabaseClient
                    .rpc('get_or_create_private_chat', {
                        user1_id: currentUser.id,
                        user2_id: userId
                    });

                if (error) throw error;

                if (chatId) {
                    await loadChats();
                    selectChat(chatId);
                }
            } catch (err) {
                console.error('Error creating chat:', err);
                showToast('Ошибка создания чата');

        window.createGroupChat = async function(groupName, memberIds) {
            try {
                console.log('🔵 Creating group chat:', { groupName, memberIds, currentUserId: currentUser?.id });
                
                if (!currentUser?.id) {
                    showToast('⚠️ Ошибка: пользователь не авторизован');
                    return;
                }
                
                // 1. Создаём чат
                const { data: chat, error: chatError } = await supabaseClient
                    .from('chats')
                    .insert({ 
                        name: groupName, 
                        type: 'group', 
                        created_by: currentUser.id 
                    })
                    .select('id')
                    .single();

                console.log('📝 Chat create result:', { chat, chatError });
                
                if (chatError) {
                    console.error('Chat creation error:', chatError);
                    throw chatError;
                }

                // 2. Добавляем создателя + выбранных участников
                const allMembers = [currentUser.id, ...memberIds];
                const membersInsert = allMembers.map(uid => ({ chat_id: chat.id, user_id: uid }));
                
                console.log('👥 Adding members:', membersInsert);

                const { error: membersError } = await supabaseClient
                    .from('chat_members')
                    .insert(membersInsert);
                
                console.log('📝 Members insert result:', { membersError });

                if (membersError) {
                    console.error('Members insertion error:', membersError);
                    throw membersError;
                }

                showToast(`👥 Группа «${groupName}» создана`);
                await loadChats();
                selectChat(chat.id);
            } catch (err) {
                console.error('Error creating group chat:', err);
                showToast('Ошибка создания группы: ' + (err.message || err));
            }
        };

        // Сохранить телефон и имя
        window.saveProfileData = async function() {

            const phone = document.getElementById('profilePhone')?.value?.trim() || null;
            const name  = document.getElementById('profileName')?.value?.trim();

            if (!name) { showToast('Введите имя'); return; }

                    .from('users')
                    .update({ phone, name, updated_at: new Date().toISOString() })
                    .eq('id', currentUserProfile.id);

                if (error) throw error;

                // Обновляем локальный профиль
                currentUserProfile.name = name;
                currentUserProfile.phone = phone;

                // Обновляем шапку
                document.getElementById('headerUser') && 
                    (document.getElementById('headerUser').textContent = '> ' + 
                        ({ manager:'Руководитель', deputy_head:'Зам. начальника',
                           worker:'Исполнитель', engineer:'Инженер', support:'Техподдержка' }
                        [currentUserProfile.role] || 'Пользователь'));

                showToast('✅ Профиль сохранён');
                btn.textContent = '✅ Сохранено';
                setTimeout(() => { btn.disabled = false; btn.textContent = '💾 Сохранить'; }, 2000);

            } catch (err) {
                console.error('saveProfileData error:', err);
                showToast('Ошибка: ' + err.message);
                btn.disabled = false;
                btn.textContent = '💾 Сохранить';
            }
        };

        // Загрузка аватара в Supabase Storage
        window.uploadProfileAvatar = async function(input) {
            const file = input.files?.[0];
            if (!file) return;

            // Проверяем размер (макс 2MB)
            if (file.size > 2 * 1024 * 1024) {
                showToast('Файл слишком большой (макс. 2MB)');
                return;
            }

            showToast('⏳ Загружаем фото…');

            try {
                const ext  = file.name.split('.').pop();
                const path = `${currentUserProfile.id}.${ext}`;

                // Загружаем в bucket 'avatars'
                const { error: upErr } = await supabaseClient.storage
                    .from('avatars')
                    .upload(path, file, { upsert: true, contentType: file.type });

                if (upErr) throw upErr;

                // Получаем публичный URL
                const { data: urlData } = supabaseClient.storage
                    .from('avatars')
                    .getPublicUrl(path);

                const avatar_url = urlData.publicUrl + '?t=' + Date.now();

                // Сохраняем URL в профиль
                const { error: dbErr } = await supabaseClient
                    .from('users')
                    .update({ avatar_url, updated_at: new Date().toISOString() })
                    .eq('id', currentUserProfile.id);

                if (dbErr) throw dbErr;

                currentUserProfile.avatar_url = avatar_url;

                // Обновляем аватар на странице
                const display = document.getElementById('profileAvatarDisplay');
                if (display) {
                    display.innerHTML = `<img src="${avatar_url}" class="profile-avatar" alt="avatar">`;
                }

                showToast('✅ Фото обновлено');

            } catch (err) {
                console.error('uploadProfileAvatar error:', err);
                showToast('Ошибка загрузки: ' + err.message);
            }

            input.value = ''; // сбрасываем input
        };

        // Открыть личный чат с пользователем (или создать если не существует)
        window.openChatWithUser = async function(userId, userName) {
            try {
                // Проверяем существующий личный чат
                const { data: existingChat, error: checkError } = await supabaseClient
                    .from('chat_members')
                    .select('chat_id, chats!inner(id, type)')
                    .eq('user_id', currentUser.id)
                    .eq('chats.type', 'private');
                
                if (checkError) throw checkError;
                
                // Ищем чат где есть оба пользователя
                let chatId = null;
                for (const member of existingChat || []) {
                    const { data: otherMember, error: otherError } = await supabaseClient
                        .from('chat_members')
                        .select('user_id')
                        .eq('chat_id', member.chat_id)
                        .neq('user_id', currentUser.id)
                        .single();
                    
                    if (!otherError && otherMember?.user_id === userId) {
                        chatId = member.chat_id;
                        break;
                    }
                }
                
                // Если чат не найден - создаём новый
                if (!chatId) {
                    const { data: newChat, error: createError } = await supabaseClient
                        .from('chats')
                        .insert({ type: 'private', created_by: currentUser.id })
                        .select('id')
                        .single();
                    
                    if (createError) throw createError;
                    
                    // Добавляем обоих пользователей
                    const { error: membersError } = await supabaseClient
                        .from('chat_members')
                        .insert([
                            { chat_id: newChat.id, user_id: currentUser.id },
                            { chat_id: newChat.id, user_id: userId }
                        ]);
                    
                    if (membersError) throw membersError;
                    
                    chatId = newChat.id;
                }
                
                // Переходим в мессенджер и открываем чат
                await navigate('messenger');
                showMessengerTab('chats');
                await loadChats();
                selectChat(chatId);
                
            } catch (err) {
                console.error('openChatWithUser error:', err);
                showToast('Ошибка открытия чата');
            }
        };

        window.deleteUser = async function(userId, userName) {
            if (!confirm(`Удалить пользователя "${userName}"?\n\nВсе задачи и данные пользователя останутся в системе.`)) return;
            try {
                // Удаляем из public.users (auth.users остаётся, но пользователь не сможет войти без записи в public.users)
                const { error } = await supabaseClient
                    .from('users')
                    .delete()
                    .eq('id', userId);

                if (error) throw error;

                showToast(`Пользователь "${userName}" удалён`);
                // Перезагружаем список
                const content = document.getElementById('content');
                if (content) await renderUsers(content);
            } catch (err) {
                console.error('deleteUser error:', err);
                showToast('Ошибка удаления: ' + (err.message || err));
            }
        };

        function matrixRain() {
            const canvas = document.getElementById('matrix-canvas');
            const ctx = canvas.getContext('2d');

            // Set canvas size to window size
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;

            // Matrix characters
            const matrix = "アイウエオカキクケコサシスセソタチツテトナニヌネノハヒフヘホマミムメモヤユヨラリルレロワヲン0123456789ABCDEFGHIJKLMNOPQRSTUVWXYZ";
            const matrixArray = matrix.split("");

            const fontSize = 16;
            const columns = canvas.width / fontSize;
            const drops = [];

            // Initialize drops
            for (let x = 0; x < columns; x++) {
                drops[x] = 1;
            }

            function draw() {
                // Black background with slight transparency for trail effect
                ctx.fillStyle = 'rgba(0, 0, 0, 0.1)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                // Green text
                ctx.fillStyle = '#00FF88';
                ctx.font = fontSize + 'px monospace';

                // Loop over drops
                for (let i = 0; i < drops.length; i++) {
                    // Random character
                    const text = matrixArray[Math.floor(Math.random() * matrixArray.length)];

                    // Draw the character
                    ctx.fillText(text, i * fontSize, drops[i] * fontSize);

                    // Reset drop to top randomly
                    if (drops[i] * fontSize > canvas.height && Math.random() > 0.975) {
                        drops[i] = 0;
                    }

                    // Move drop down
                    drops[i]++;
                }
            }

            // Animate
            setInterval(draw, 80);
        }

        let touchStartX = 0;

        // Initialize swipe functionality on content
        function initSwipeHandlers() {
            document.querySelectorAll('.card').forEach(card => {
                if (!card.closest('.modal')) {
                    card.addEventListener('touchstart', handleTouchStart, { passive: true });
                    card.addEventListener('touchmove', handleTouchMove, { passive: false });
                    card.addEventListener('touchend', handleTouchEnd);
                }
            });
        }

        function handleTouchStart(e) {
            touchStartX = e.touches[0].clientX;
            touchStartY = e.touches[0].clientY;
            currentSwipeItem = e.currentTarget;
        }

        function handleTouchMove(e) {
            if (!currentSwipeItem) return;
            
            const touchCurrentX = e.touches[0].clientX;
            const touchCurrentY = e.touches[0].clientY;
            
            const diffX = touchCurrentX - touchStartX;
            const diffY = touchCurrentY - touchStartY;
            
            // Only handle horizontal swipe (more than 50px and less vertical movement)
            if (Math.abs(diffX) > 50 && Math.abs(diffX) > Math.abs(diffY)) {
                e.preventDefault();
                
                if (diffX < 0) {
                    // Swipe left - show delete action
                    currentSwipeItem.style.transform = `translateX(${diffX}px)`;
                    
                    // Add visual feedback for delete (red)
                    if (diffX < -100) {
                        currentSwipeItem.style.background = 'rgba(255, 51, 102, 0.2)';
                    } else {
                        currentSwipeItem.style.background = '';
                    }
                } else if (diffX > 0) {
                    // Swipe right - show description action (cyan glow)
                    currentSwipeItem.style.transform = `translateX(${diffX}px)`;
                    
                    // Add visual feedback for description (cyan)
                    if (diffX > 100) {
                        currentSwipeItem.style.background = 'rgba(0, 217, 255, 0.2)';
                    } else {
                        currentSwipeItem.style.background = '';
                    }
                }
            }
        }

        function handleTouchEnd(e) {
            if (!currentSwipeItem) return;
            
            const touchEndX = e.changedTouches[0].clientX;
            const diffX = touchEndX - touchStartX;
            
            const itemId = currentSwipeItem.getAttribute('data-id');
            const itemType = currentSwipeItem.getAttribute('data-type');
            
            // If swiped left more than 100px, show delete confirmation
            if (diffX < -100) {
                if (itemId && itemType) {
                    showDeleteConfirmation(itemId, itemType);
                }
            }
            // If swiped right more than 100px, open detail
            else if (diffX > 100) {
                if (itemId && itemType) {
                    if (itemType === 'task') {
                        showTaskDetail(itemId);
                    } else if (itemType === 'installation') {
                        window.showInstallationDetail(itemId);
                    } else if (itemType === 'pr') {
                        showPRDetailModal(itemId);
                    }
                }
            }
            
            // Reset transform
            currentSwipeItem.style.transform = '';
            currentSwipeItem.style.background = '';
            currentSwipeItem = null;
        }

        // Храним время последнего просмотра в localStorage

        function getLastSeen(type, id) {

        // Считает непрочитанные комментарии по списку сущностей
        // entities = [{ type, id }], возвращает Map<id, count>
        async function fetchUnreadCounts(entities) {
            const result = new Map();
            if (!entities.length) return result;

            // Проверяем каждую сущность отдельно с её lastSeen
            for (const e of entities) {
                const lastSeen = getLastSeen(e.type, e.id);
                const { count, error } = await supabaseClient
                    .from('comments')
                    .select('id', { count: 'exact', head: true })
                    .eq('resource_type', e.type)
                    .eq('resource_id', e.id)
                    .gt('created_at', lastSeen)
                    .neq('user_id', currentUserProfile?.id ?? '');
                
                if (!error && count > 0) {
                    result.set(e.id, count);
                }
            }
            return result;

        function formatCommentText(text) {
          if (!text) return '';
          let formatted = text.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');

          formatted = formatted.replace(/`(.*?)`/g, '<code style="background:#f0f0f0;padding:2px 6px;border-radius:3px;font-family:monospace">$1</code>');
          formatted = formatted.replace(/^&gt; (.*$)/gm, '<blockquote style="border-left:3px solid #ddd;margin:10px 0;padding-left:10px;color:#666">$1</blockquote>');
          formatted = formatted.replace(/^- (.*$)/gm, '<li style="margin-left:20px;list-style-type:disc">$1</li>');

         return formatted;
        }

                    <strong style="color:var(--accent)">${comment.user?.name || 'Аноним'}</strong>

                ${comment.file_url ? `<div style="margin-top:8px;padding:8px;background:rgba(255,255,255,0.1);border-radius:4px">${comment.file_name.match(/\.(jpg|jpeg|png|gif|webp)$/i) ? `<img src="${comment.file_url}" alt="${comment.file_name}" style="max-width:300px;border-radius:4px;cursor:pointer" onclick="window.open('${comment.file_url}', '_blank')"><div style="margin-top:4px"><a href="${comment.file_url}" download="${comment.file_name}" style="color:var(--accent);text-decoration:none;font-size:12px">📎 Скачать ${comment.file_name}</a></div>` : `<div style="display:flex;align-items:center;gap:8px"><span style="font-size:20px">📎</span><a href="${comment.file_url}" download="${comment.file_name}" style="color:var(--accent);text-decoration:none;font-size:13px">${comment.file_name}</a></div>`}</div>` : ''}
                <div style="display:flex;gap:8px;margin-top:8px">
                  ${isOwnComment ? `<button class="btn btn-sm" style="padding:4px 8px;font-size:11px;background:transparent;color:var(--text-muted);border:1px solid var(--text-muted)" onclick="editInstallationComment('${comment.id}', '${instId}')">✏️ Редактировать</button><button class="btn btn-sm btn-danger" style="padding:4px 8px;font-size:11px;background:#ef4444;border:none;color:white" onclick="deleteInstallationComment('${comment.id}', '${instId}')">🗑 Удалить</button>` : ''}
                </div>

            });
            
            commentsList.innerHTML = html;
            commentsList.scrollTop = commentsList.scrollHeight;
            
          } catch (error) {
            console.error('Error loading installation comments:', error);
            commentsList.innerHTML = '<p style="color:var(--danger);text-align:center;padding:20px;">Ошибка загрузки комментариев: ' + error.message + '</p>';

        window.sendInstallationComment = async function(instId) {
          const input = document.getElementById('commentInputInst');
          const message = input?.value.trim();
          const fileInput = document.getElementById('fileInputInst');
          const file = fileInput?.files[0];
          
          if (!message && !file) {
            showToast('⚠️ Введите текст или выберите файл');
            return;
          }
          
          try {
            let file_url = null;
            let file_name = null;
            
            if (file) {
              const uploadResult = await uploadCommentFile(file, instId);
              file_url = uploadResult.url;
              file_name = uploadResult.name;
            }
            
            const { data: comment, error } = await supabaseClient
              .from('comments')
              .insert([{resource_id: instId, resource_type: 'installation', user_id: currentUserProfile?.id, message: message, file_url: file_url, file_name: file_name, is_edited: currentEditingCommentId ? true : false}])
              .select()
              .single();
            
            if (error) throw error;
            
            input.value = '';
            if (fileInput) fileInput.value = '';
            selectedFile= null;
            currentEditingCommentId = null;
            document.getElementById('filePreviewInst').innerHTML = '';
            loadAndRenderInstallationComments(instId);
            showToast('✅ Комментарий отправлен');
            
          } catch (error) {
            console.error('Error sending installation comment:', error);
            showToast('❌ Ошибка отправки комментария');
          }
        };
        
        window.editInstallationComment = async function(commentId, instId) {
          try {
            const { data: comment } = await supabaseClient.from('comments').select('message').eq('id', commentId).single();
            if (!comment) throw new Error('Комментарий не найден');
            const input = document.getElementById('commentInputInst');
            input.value = comment.message;
            input.focus();
            currentEditingCommentId = commentId;
            const cancelBtn = document.createElement('button');
            cancelBtn.id = 'replyCancelBtn';
            cancelBtn.className = 'btn btn-outline';
            cancelBtn.textContent = 'Отмена редактирования';
            cancelBtn.onclick = () => {input.value = ''; currentEditingCommentId = null; cancelBtn.remove();};
            input.parentNode.appendChild(cancelBtn);
            showToast('✏️ Редактируйте комментарий и нажмите "Отправить"');
          } catch (error) {
            console.error('Error loading comment for edit:', error);
            showToast('❌ Ошибка загрузки комментария');
          }
        };
        
        window.deleteInstallationComment = async function(commentId, instId) {
          if (!confirm('Удалить комментарий?')) return;
          try {
            const { data: comment } = await supabaseClient.from('comments').select('file_url').eq('id', commentId).single();
            if (comment && comment.file_url) {
              const fileName = comment.file_url.substring(comment.file_url.lastIndexOf('/') +1);
              const { error: storageError } = await supabaseClient.storage.from('comment-files').remove([fileName]);
              if (storageError) console.error('Error deleting file:', storageError);
            }
            const { error } = await supabaseClient.from('comments').delete().eq('id', commentId);
            if (error) throw error;
            loadAndRenderInstallationComments(instId);
            showToast('✅ Комментарий удален');
          } catch (error) {
            console.error('Error deleting comment:', error);
            showToast('❌ Ошибка удаления комментария');
          }
        };

            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();

        // ============================================================
        // АТСС ЗАГРУЗКА
        // ============================================================

        const ATSS_TABLE      = 'atss_q1_2026';
        const ATSS_SHEET_NAME = '1 квартал 2026';
        const ATSS_BATCH_SIZE = 50;

        function atssInt(v) {
            if (v === null || v === undefined || v === '') return null;
            const n = parseInt(v, 10);
            return isNaN(n) ? null : n;
        }
        function atssStr(v) {
            if (v === null || v === undefined) return null;
            const s = String(v).trim();
            return s === '' || s === '-' ? null : s;
        }
        function atssDate(v) {
            // Возвращает ISO-строку для PostgreSQL TIMESTAMP
            if (!v) return null;
            if (v instanceof Date) {
                // Excel дата через cellDates:true — уже Date объект
                const y = v.getFullYear();
                const m = String(v.getMonth() + 1).padStart(2, '0');
                const d = String(v.getDate()).padStart(2, '0');
                return `${y}-${m}-${d}T00:00:00`;
            }
            // Строка вида "20260112" — парсим вручную
            const s = String(v).replace(/\D/g, '');
            if (s.length === 8) {
                return `${s.slice(0,4)}-${s.slice(4,6)}-${s.slice(6,8)}T00:00:00`;
            }
            return null;
        }

        function atssParseXlsx(arrayBuffer) {
            if (!window.XLSX) throw new Error('Библиотека XLSX не загружена. Добавьте тег script в <head>.');
            const wb = window.XLSX.read(arrayBuffer, { type: 'array', cellDates: true });
            const ws = wb.Sheets[ATSS_SHEET_NAME];
            if (!ws) throw new Error(`Лист "${ATSS_SHEET_NAME}" не найден. Доступные: ${wb.SheetNames.join(', ')}`);
            const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false });
            const groups = new Map();
            for (let ri = 1; ri < rows.length; ri++) {
                const row = rows[ri];
                if (!row) continue;
                const [tip, id_pl, serv, adres, rayon, id_sk, naim, status, tip_sk, plan] = row;
                if (tip == null && id_pl == null && serv == null) continue;
                const key = `${serv}__${id_pl}`;
                if (!groups.has(key)) {
                    groups.set(key, { tip: atssStr(tip), id_ploshadki: atssInt(id_pl), servisnyy_id: atssStr(serv),
                        adres_razmeshcheniya: atssStr(adres), rayon: atssStr(rayon), plan_date: null, sks: [] });
                }
                const g = groups.get(key);
                if (plan && g.plan_date === null) g.plan_date = plan;
                g.sks.push({ id_sk: atssInt(id_sk), naim: atssStr(naim), status: atssStr(status), tip_sk: atssInt(tip_sk) });
            }
            return [...groups.values()].map(g => {
                const rec = {
                    tip: g.tip, id_ploshadki: g.id_ploshadki, servisnyy_id: g.servisnyy_id,
                    adres_razmeshcheniya: g.adres_razmeshcheniya, rayon: g.rayon,
                    planovaya_data_1_kv_2026: atssDate(g.plan_date),
                    id_sk: null, naimenovanie_sk: null, status_oborudovaniya: null, tip_sk_po_dogovoru: null,
                    id_sk2: null, naimenovanie_sk2: null, status_oborudovaniya2: null, tip_sk_po_dogovoru2: null,
                    id_sk3: null, naimenovanie_sk3: null, status_oborudovaniya3: null, tip_sk_po_dogovoru3: null,
                    id_sk4: null, naimenovanie_sk4: null, status_oborudovaniya4: null, tip_sk_po_dogovoru4: null,
                    id_sk5: null, naimenovanie_sk5: null, status_oborudovaniya5: null, tip_sk_po_dogovoru5: null,
                    id_sk6: null, naimenovanie_sk6: null, status_oborudovaniya6: null, tip_sk_po_dogovoru6: null,
                };
                g.sks.forEach((sk, idx) => {
                    const sfx = idx === 0 ? '' : String(idx + 1);
                    rec[`id_sk${sfx}`] = sk.id_sk;
                    rec[`naimenovanie_sk${sfx}`] = sk.naim;
                    rec[`status_oborudovaniya${sfx}`] = sk.status;
                    rec[`tip_sk_po_dogovoru${sfx}`] = sk.tip_sk;
                });
                return rec;
            });
        }

        async function atssUpsertBatches(records, onProgress) {
            const total = records.length;
            let done = 0;
            const errors = [];
            for (let i = 0; i < total; i += ATSS_BATCH_SIZE) {
                const batch = records.slice(i, i + ATSS_BATCH_SIZE);
                const { error } = await supabaseClient.from(ATSS_TABLE).upsert(batch, {
                    onConflict: 'id_ploshadki', ignoreDuplicates: false
                });
                if (error) errors.push({ from: i, to: i + batch.length, message: error.message });
                done += batch.length;
                onProgress(done, total, errors.length);
            }
            return errors;
        }

        window.renderAtssUpload = function(container) {
            container.innerHTML = `
                <div class="card" style="max-width:560px;margin:0 auto">
                    <h3 style="margin-bottom:16px">📋 Загрузка план-графика АТСС</h3>
                    <div style="background:rgba(0,217,255,0.05);border:1px solid var(--border);border-radius:10px;
                                padding:14px 16px;margin-bottom:20px;font-size:13px;color:var(--text-muted);line-height:1.7">
                        Загрузите <strong style="color:var(--text)">.xlsx</strong> с листом
                        <strong style="color:var(--text)">«1 квартал 2026»</strong>.<br>
                        Новые площадки добавятся, изменившиеся — обновятся.
                    </div>
                    <div class="form-group">
                        <label>Файл Excel</label>
                        <input type="file" id="atss-file-input" accept=".xlsx,.xls"
                            style="width:100%;padding:10px 12px;background:rgba(10,10,15,0.8);
                                   border:1px dashed var(--border);border-radius:8px;
                                   color:var(--text);font-size:14px;cursor:pointer;box-sizing:border-box"/>
                    </div>
                    <button class="btn" id="atss-upload-btn" style="width:100%;margin-top:4px"
                            onclick="atssStartUpload()">
                        ⬆ Загрузить в базу
                    </button>
                    <div id="atss-progress" style="display:none;margin-top:18px">
                        <div style="background:var(--secondary);border-radius:4px;height:6px;overflow:hidden">
                            <div id="atss-bar" style="height:100%;background:var(--accent);width:0;transition:width .3s ease;border-radius:4px"></div>
                        </div>
                        <div id="atss-status" style="font-size:12px;color:var(--text-muted);margin-top:6px"></div>
                    </div>
                    <div id="atss-log" style="display:none;margin-top:14px;background:rgba(10,10,15,0.8);
                        border:1px solid var(--border);border-radius:8px;padding:10px 12px;
                        font-size:12px;font-family:'Courier New',monospace;max-height:200px;overflow-y:auto;line-height:1.7"></div>
                </div>
            `;
        };

        window.atssStartUpload = async function() {
            const fileInput = document.getElementById('atss-file-input');
            const btn       = document.getElementById('atss-upload-btn');
            const progress  = document.getElementById('atss-progress');
            const bar       = document.getElementById('atss-bar');
            const status    = document.getElementById('atss-status');
            const log       = document.getElementById('atss-log');
            const file = fileInput?.files?.[0];
            if (!file) { showToast('⚠ Выберите файл .xlsx'); return; }
            function addLog(msg, color) {
                log.style.display = 'block';
                const div = document.createElement('div');
                div.style.color = color || 'var(--text-muted)';
                div.textContent = msg;
                log.appendChild(div);
                log.scrollTop = log.scrollHeight;
            }
            btn.disabled = true;
            log.innerHTML = '';
            log.style.display = 'block';
            progress.style.display = 'block';
            bar.style.width = '0%';
            bar.style.background = 'var(--accent)';
            try {
                addLog(`📂 Читаем: ${file.name}`);
                status.textContent = 'Разбираем файл…';
                const buffer  = await file.arrayBuffer();
                const records = atssParseXlsx(buffer);
                addLog(`✓ Площадок: ${records.length}`, '#27ae60');
                addLog(`⬆ Отправляем батчами по ${ATSS_BATCH_SIZE}…`);
                const errors = await atssUpsertBatches(records, (done, total, errCnt) => {
                    bar.style.width = Math.round((done / total) * 100) + '%';
                    status.textContent = `${done} / ${total} · ошибок: ${errCnt}`;
                });
                if (errors.length === 0) {
                    bar.style.background = '#27ae60';
                    status.textContent = `✅ Успешно: ${records.length} записей`;
                    addLog(`✅ Готово! Загружено ${records.length} записей`, '#27ae60');
                    showToast(`✅ АТСС загружен: ${records.length} записей`);
                } else {
                    bar.style.background = 'var(--danger)';
                    status.textContent = `⚠ Ошибки: ${errors.length}`;
                    errors.forEach(e => addLog(`✗ строки ${e.from}–${e.to}: ${e.message}`, 'var(--danger)'));
                    showToast(`⚠ Загружено с ошибками (${errors.length})`);
                }
            } catch (err) {
                bar.style.background = 'var(--danger)';
                status.textContent = '❌ Ошибка';
                addLog(`❌ ${err.message}`, 'var(--danger)');
                showToast('❌ Ошибка загрузки');
            } finally {
                btn.disabled = false;
            }
        };

        // ============================================================
        // КОНЕЦ БЛОКА АТСС ЗАГРУЗКА
        // ============================================================
</script>
