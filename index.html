        function _stopAllPolling() {
            if (window._fastPollInterval)    { clearInterval(window._fastPollInterval);    window._fastPollInterval    = null; }
            if (window._fallbackPollInterval){ clearInterval(window._fallbackPollInterval); window._fallbackPollInterval = null; }
            if (window._aggressivePollInterval){ clearInterval(window._aggressivePollInterval); window._aggressivePollInterval = null; }

        window.goBackToChats = function() {
            const wrap = document.getElementById('messenger-wrap');
            wrap?.classList.remove('chat-open');
            // Reset inline styles set by visualViewport
            if (wrap) { wrap.style.height = ''; wrap.style.top = ''; }
            // Restore body scroll on mobile
            document.body.style.overflow = '';
            document.body.style.position = '';
            document.documentElement.style.overflow = '';
            _stopAllPolling();
            // Останавливаем polling непрочитанных
            if (unreadPollingInterval) {
                clearInterval(unreadPollingInterval);
                unreadPollingInterval = null;
            }
            // Отписываемся от глобальной подписки unread
            if (window._allChatsSub) {

            // На мобиле: для map/analytics добавляем chat-open чтобы показать mainArea
            if (wrap && (tab === 'map' || tab === 'analytics')) {
                wrap.classList.add('chat-open');
            }
            
            // Всегда показываем sidebar и mainArea
            if (sidebar) sidebar.style.display = '';
            if (mainArea) mainArea.style.display = '';
            
            if (tab === 'chats') {
                // На мобиле — убираем chat-open если чат не выбран
                if (wrap && !messengerState.selectedChat) wrap.classList.remove('chat-open');

                loadChats();

                // Не скрываем sidebar - просто рендерим карту в mainArea
                _stopAllPolling();
                if (mainArea) renderMapScreen(mainArea);
            } else if (tab === 'analytics') {
                // Не скрываем sidebar - просто рендерим аналитику в mainArea

        window.filterChats = function(type) {
            document.querySelectorAll('#cl-filter .pill').forEach(p => p.classList.remove('active'));
            document.querySelector('#cl-filter .pill[data-filter="' + type + '"]')?.classList.add('active');
            messengerState.activeFilter = type;
            renderChatList();
        };

        async function loadChats() {
            try {
                // Запрашиваем без pinned/muted — добавим если есть
                let members = null, error = null;
                const r1 = await supabaseClient
                    .from('chat_members')
                    .select('chat_id, pinned, muted, chats:chat_id(id, name, type, created_by)')
                    .eq('user_id', currentUser.id);
                if (r1.error?.message?.includes('pinned') || r1.error?.message?.includes('muted')) {
                    // Колонок нет — запрашиваем без них
                    console.warn('pinned/muted columns missing, loading without them');
                    const r2 = await supabaseClient
                        .from('chat_members')
                        .select('chat_id, chats:chat_id(id, name, type, created_by)')
                        .eq('user_id', currentUser.id);
                    members = r2.data;
                    error = r2.error;
                } else {
                    members = r1.data;
                    error = r1.error;
                }

                if (error) throw error;

                const chats = members || [];

                // Загружаем количество участников для каждого чата
                if (chats.length) {
                    const chatIds = chats.map(c => c.chat_id);
                    const { data: memberCounts } = await supabaseClient
                        .from('chat_members')
                        .select('chat_id', { count: 'exact', head: true })
                        .in('chat_id', chatIds)
                        .eq('chat_id', chatIds[0]); // группируем по chat_id
                    
                    // Для простоты - загружаем для каждого чата отдельно
                    for (const chat of chats) {
                        const { count } = await supabaseClient
                            .from('chat_members')
                            .select('*', { count: 'exact', head: true })
                            .eq('chat_id', chat.chat_id);
                        chat.membersCount = count || 1;
                    }
                }

                // Для приватных чатов загружаем имя собеседника
                const privateChatIds = chats
                    .filter(c => c.chats?.type === 'private')
                    .map(c => c.chat_id);

                if (privateChatIds.length) {
                    const { data: otherMembers } = await supabaseClient
                        .from('chat_members')
                        .select('chat_id, users:user_id(id, name)')
                        .in('chat_id', privateChatIds)
                        .neq('user_id', currentUser.id);

                    const partnerMap = {};
                    (otherMembers || []).forEach(m => {
                        partnerMap[m.chat_id] = m.users?.name || 'Пользователь';
                        partnerMap[m.chat_id + '_id'] = m.users?.id;
                    });

                    chats.forEach(c => {
                        if (c.chats?.type === 'private' && partnerMap[c.chat_id]) {
                            c.displayName = partnerMap[c.chat_id];
                            c.partnerId   = partnerMap[c.chat_id + '_id'];
                        }
                    });
                }

                // Загружаем последние сообщения по каждому чату
                if (chats.length) {
                    const chatIds = chats.map(c => c.chat_id);
                    const { data: lastMsgs } = await supabaseClient
                        .from('messages')
                        .select('chat_id, content, created_at, user_id')
                        .in('chat_id', chatIds)
                        .order('created_at', { ascending: false })
                        .limit(chatIds.length * 3);
                    const lastMsgMap = {};
                    (lastMsgs || []).forEach(m => {
                        if (!lastMsgMap[m.chat_id]) lastMsgMap[m.chat_id] = m;
                    });
                    chats.forEach(c => { c.lastMsg = lastMsgMap[c.chat_id] || null; });
                }

                messengerState.chats = chats;

                // Непрочитанные - проверяем для каждого чата отдельно
                if (chats.length) {
                    const unreadMap = {};
                    for (const chat of chats) {
                        const lastSeen = getLastSeen('chat', chat.chat_id);
                        const { count, error } = await supabaseClient
                            .from('messages')
                            .select('id', { count: 'exact', head: true })
                            .eq('chat_id', chat.chat_id)
                            .gt('created_at', lastSeen)
                            .neq('user_id', currentUser.id);
                        
                        if (!error && count > 0) {
                            unreadMap[chat.chat_id] = count;
                        }
                    }
                    messengerState.chatUnread = unreadMap;
                }
                renderChatList();
                updateChatsUnreadBadge();
            } catch (err) {
                console.error('Error loading chats:', err);
                document.getElementById('chat-list').innerHTML = `
                    <div class="chat-loading">Ошибка загрузки чатов</div>
                `;
            }
        }

        // Читает текст из jsonb или string content сообщения
        function getMsgText(content) {
            if (!content) return '';
            if (typeof content === 'string') return content;
            if (typeof content === 'object') {
                return content.text || content.message || content.content || '';
            }
            return String(content);
        }

        function renderChatList() {
            const chatList = document.getElementById('chat-list');
            if (!chatList) return;
            const filter = messengerState.activeFilter || 'all';
            let chats = messengerState.chats;
            if (filter === 'private') chats = chats.filter(c => c.chats?.type !== 'group');
            if (filter === 'group')   chats = chats.filter(c => c.chats?.type === 'group');
        
            if (!chats.length) {
                chatList.innerHTML = '<div class="chat-loading">Нет чатов<br><small style="color:var(--text-muted)">Нажмите + Чат чтобы начать</small></div>';
                return;
            }
        
            const pinned  = chats.filter(c => c.pinned);
            const regular = chats.filter(c => !c.pinned);
        
            const buildItem = (chat) => {
                const isActive  = messengerState.selectedChat?.chat_id === chat.chat_id;
                const isGroup   = chat.chats?.type === 'group';
                const isPinned  = !!chat.pinned;
                const isMuted   = !!chat.muted;
                const displayName = isGroup
                    ? (chat.chats?.name || 'Группа')
                    : (chat.displayName || chat.chats?.name || 'Чат');
                const firstLetter = displayName.charAt(0).toUpperCase();
                const unreadCount = messengerState.chatUnread?.[chat.chat_id] || 0;
        
                const lm = chat.lastMsg;
                let lastText = isGroup ? '👥 Групповой' : '👤 Личный';
                let lastTime = '';
                let isOwnLast = false;
                if (lm) {
                    lastText = lm.content?.text || (lm.type === 'job' ? '📍 Работа' : '📎 Файл');
                    if (lastText.length > 32) lastText = lastText.slice(0, 32) + '…';
                    isOwnLast = lm.user_id === currentUser?.id;
                    const d = new Date(lm.created_at);
                    const now = new Date();
                    lastTime = d.toDateString() === now.toDateString()
                        ? d.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' })
                        : d.toLocaleDateString('ru-RU', { day: 'numeric', month: 'short' });
                }
        
                const ticks = isOwnLast
                    ? '<span class="cl-ticks' + (unreadCount === 0 ? ' read' : '') + '">✓✓</span> '
                    : '';
        
                let rightSlot = '';
                if (unreadCount && !isActive) {
                    rightSlot = '<span class="cl-badge' + (isMuted ? ' muted-badge' : '') + '">' + (unreadCount > 99 ? '99+' : unreadCount) + '</span>';
                } else {
                    const icons = (isPinned ? '<span class="cl-pin-icon">📌</span>' : '') + (isMuted ? '<span class="cl-mute-icon">🔕</span>' : '');
                    if (icons) rightSlot = '<span class="cl-meta-icons">' + icons + '</span>';
                }
        
                const itemCls = 'cl-item' + (isActive ? ' active' : '') + (isPinned ? ' pinned-item' : '');
                const createdBy = chat.chats?.created_by || '';
                const isCreator = createdBy === currentUser?.id;
                
                // Swipe actions (visible when swiped)
                // Для групп кнопка удаления только для создателя
                const canDeleteGroup = !isGroup || isCreator;
                const swipeActions = [
                    '<div class="cl-swipe-actions">',
                    '  <button class="cl-action-btn cl-action-pin" onclick="event.stopPropagation();togglePinChat(\'' + chat.chat_id + '\');">',
                    '    <span class="btn-icon">' + (isPinned ? '📄' : '📌') + '</span>',
                    '    <span>' + (isPinned ? 'Откреп' : 'Закреп') + '</span>',
                    '  </button>',
                    canDeleteGroup ? ('  <button class="cl-action-btn cl-action-del" onclick="event.stopPropagation();confirmDeleteChat(\'' + chat.chat_id + '\',\'' + isGroup + '\',\'' + createdBy + '\');">' +
                    '    <span class="btn-icon">🗑</span>' +
                    '    <span>' + (isGroup ? 'Удалить' : 'Удалить') + '</span>' +
                    '  </button>') : '',
                    '</div>'
                ].join('');
        
                return [
                    '<div class="cl-item-wrap" data-chat-id="' + chat.chat_id + '">',
                    swipeActions,
                    '  <div class="' + itemCls + '" onclick="selectChat(\'' + chat.chat_id + '\')">',
                    '    <div class="cl-avatar ' + (isGroup ? 'group' : '') + '">' + firstLetter + '</div>',
                    '    <div class="cl-info">',
                    '      <div class="cl-name-row">',
                    '        <div class="cl-name">' + displayName + '</div>',
                    '        <div style="display:flex;align-items:center;gap:4px">' + ticks + '<span class="cl-time">' + lastTime + '</span>' + rightSlot + '</div>',
                    '      </div>',
                    '      <div class="cl-sub">' + lastText + '</div>',
                    '    </div>',
                    '    <button class="cl-dots-btn" onclick="event.stopPropagation();showChatContextMenu(\'' + chat.chat_id + '\', ' + isGroup + ', \'' + createdBy + '\', event)">⋮</button>',
                    '  </div>',
                    '</div>'
                ].join('');
            };
        
            let html = '';
            if (pinned.length) {
                html += '<div class="cl-pin-divider">📌 Закреплённые</div>';
                html += pinned.map(buildItem).join('');
                if (regular.length) html += '<div class="cl-pin-divider">Чаты</div>';
            }
            html += regular.map(buildItem).join('');
            chatList.innerHTML = html;
            
            // Инициализируем свайп-обработчики после рендера
            initChatSwipeHandlers();
        }

        // Обработчики свайпа для чатов
        function initChatSwipeHandlers() {
            const chatList = document.getElementById('chat-list');
            if (!chatList) return;
            
            let startX = 0;
            let currentItem = null;
            let isSwiping = false;
            
            chatList.addEventListener('touchstart', function(e) {
                const itemWrap = e.target.closest('.cl-item-wrap');
                if (!itemWrap) return;
                
                startX = e.touches[0].clientX;
                currentItem = itemWrap;
                isSwiping = false;
            }, { passive: true });
            
            chatList.addEventListener('touchmove', function(e) {
                if (!currentItem) return;
                
                const currentX = e.touches[0].clientX;
                const diff = startX - currentX;
                
                // Свайп влево больше 50px
                if (diff > 50) {
                    isSwiping = true;
                    currentItem.classList.add('swiped');
                } else if (diff < -30) {
                    // Свайп вправо - закрываем
                    currentItem.classList.remove('swiped');
                }
            }, { passive: true });
            
            chatList.addEventListener('touchend', function(e) {
                if (!currentItem) return;
                
                // Если был свайп, предотвращаем клик
                if (isSwiping) {
                    e.preventDefault();
                }
                
                currentItem = null;
                isSwiping = false;
            });
            
            // Закрытие свайпа при клике вне
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.cl-item-wrap')) {
                    document.querySelectorAll('.cl-item-wrap.swiped').forEach(item => {
                        item.classList.remove('swiped');
                    });
                }
            });
        }

        // Обновление бейджа непрочитанных сообщений на вкладке "Чаты"
        function updateChatsUnreadBadge() {
            const badge = document.getElementById('chats-unread-badge');
            if (!badge) return;
            
            // Считаем общее количество непрочитанных
            const totalUnread = Object.values(messengerState.chatUnread || {}).reduce((sum, count) => sum + count, 0);
            
            if (totalUnread > 0) {
                badge.textContent = totalUnread > 99 ? '99+' : totalUnread;
                badge.style.display = '';
            } else {
                badge.style.display = 'none';
            }
        }

        window.showChatContextMenu = function(chatId, isGroup, createdBy, touch) {
            document.getElementById('chatCtxMenu')?.remove();
            const chat = messengerState.chats.find(c => c.chat_id === chatId);
            const isPinned  = !!chat?.pinned;
            const isMuted   = !!chat?.muted;

            menu.innerHTML = [
                '<button onclick="togglePinChat(\'' + chatId + '\');document.getElementById(\'chatCtxMenu\')?.remove()" style="width:100%;padding:12px 16px;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.07);color:#fff;text-align:left;cursor:pointer">',
                (isPinned ? '📄 Открепить' : '📌 Закрепить'),
                '</button>',
                '<button onclick="toggleMuteChat(\'' + chatId + '\');document.getElementById(\'chatCtxMenu\')?.remove()" style="width:100%;padding:12px 16px;background:transparent;border:none;border-bottom:1px solid rgba(255,255,255,0.07);color:#fff;text-align:left;cursor:pointer">',
                (isMuted ? '🔔 Вкл. звук' : '🔕 Без звука'),
                '</button>',
                '<button onclick="confirmDeleteChat(\'' + chatId + '\',\'' + isGroup + '\',\'' + createdBy + '\');document.getElementById(\'chatCtxMenu\')?.remove()" style="width:100%;padding:12px 16px;background:transparent;border:none;color:#FF3B30;text-align:left;cursor:pointer">',

        // Обновляем старый showChatMenu — оставляем для обратной совместимости
        window.showChatMenu = function(chatId, isGroupStr) {

                    actions += `<button class="danger" onclick="closeChatMenu();deleteGroupChat('${chatId}')">🗑️ Удалить группу</button>`;

                // Личный чат: удаляем только у себя (hide)

        window.closeChatMenu = function() {
            document.getElementById('chatMenuPopup')?.remove();
        };

        window.leaveGroupChat = async function(chatId) {
            if (!confirm('Выйти из группы?')) return;
            try {
                const { error } = await supabaseClient
                    .from('chat_members')
                    .delete()
                    .eq('chat_id', chatId)
                    .eq('user_id', currentUser.id);

                if (error) throw error;

                if (messengerState.selectedChat?.chat_id === chatId) {
                    messengerState.selectedChat = null;
                    messengerState.messages = [];
                    document.getElementById('chat-main').innerHTML =
                        '<div class="no-chat">Выберите чат для начала общения</div>';
                }
                showToast('Вы вышли из группы');
                await loadChats();
            } catch (err) {
                console.error('leaveGroupChat error:', err);
                showToast('Ошибка выхода из группы');
            }
        };

        // Удаление группы - только создатель
        window.deleteGroupChat = async function(chatId) {
            if (!confirm('Удалить группу и все сообщения? Это действие нельзя отменить.')) return;
            try {
                const chat = messengerState.chats.find(c => c.chat_id === chatId);
                if (chat?.chats?.created_by !== currentUser.id) {
                    showToast('Только создатель может удалить группу');
                    return;
                }
                // Удаляем чат полностью (CASCADE удалит messages и chat_members)
                const { error } = await supabaseClient.from('chats').delete().eq('id', chatId);
                if (error) throw error;

                if (messengerState.selectedChat?.chat_id === chatId) {
                    messengerState.selectedChat = null;
                    messengerState.messages = [];
                    document.getElementById('chat-main').innerHTML = '<div class="no-chat">Выберите чат</div>';
                }
                showToast('Группа удалена');
                await loadChats();
            } catch (err) {
                console.error('deleteGroupChat error:', err);
                showToast('Ошибка удаления группы');
            }
        };

        // Скрытие личного чата - только у себя, у собеседника остаётся
        window.hidePrivateChat = async function(chatId) {
            if (!confirm('Удалить чат? У вашего собеседника он останется со всей историей.')) return;
            try {
                // Удаляем только себя из chat_members
                const { error } = await supabaseClient
                    .from('chat_members')
                    .delete()
                    .eq('chat_id', chatId)
                    .eq('user_id', currentUser.id);

                if (error) throw error;

                if (messengerState.selectedChat?.chat_id === chatId) {
                    messengerState.selectedChat = null;

        async function updateActiveJobsBanner(chatId) {
            const banner = document.getElementById('active-jobs-banner');
            if (!banner) return;
            try {
                const { data: activeJobs } = await supabaseClient
                    .from('jobs')
                    .select('id, started_at, planned_duration_hours')
                    .eq('chat_id', chatId)
                    .eq('status', 'active');
                const count = (activeJobs || []).length;
                
                // Считаем просроченные
                const now = Date.now();
                const overdueCount = (activeJobs || []).filter(job => {
                    if (!job.started_at) return false;
                    const duration = (job.planned_duration_hours || 2) * 60 * 60 * 1000;
                    return (now - new Date(job.started_at).getTime()) > duration;
                }).length;
                
                if (count > 0) {
                    banner.style.display = 'flex';
                    let html = '⚠️ Активные работы: ' + count + ' адреса в работе';
                    if (overdueCount > 0) {
                        html += ' <span class="overdue-count">‼️ ' + overdueCount + ' просрочено</span>';
                    }
                    banner.innerHTML = html;
                } else {
                    banner.style.display = 'none';
                }
            } catch(e) { banner.style.display = 'none'; }
        }

            // Ищем все просроченные job-карточки

            let firstOverdue = null;
            
            overdueJobs.forEach(jobEl => {
                // Проверяем есть ли метка просрочки внутри
                if (jobEl.innerHTML.includes('Просрочено') || jobEl.style.animation?.includes('blink')) {

                }
            });
            
            if (firstOverdue) {

        async function loadMessages(chatId) {
            try {
                const { data: messages, error } = await supabaseClient
                    .from('messages')
                    .select('id, content, created_at, user_id, type, job_id, sender:user_id(name)')
                    .eq('chat_id', chatId)
                    .order('created_at', { ascending: true })
                    .limit(100);

                if (error) throw error;

                // Загружаем read receipts параллельно
                const messageIds = (messages || []).map(m => m.id);
                let receiptsMap = {};
                if (messageIds.length) {
                    const { data: receipts } = await supabaseClient
                        .from('message_read_receipts')
                        .select('message_id, user_id, read_at, users:user_id(name)')
                        .in('message_id', messageIds);
                    
                    (receipts || []).forEach(r => {
                        if (!receiptsMap[r.message_id]) receiptsMap[r.message_id] = [];
                        receiptsMap[r.message_id].push(r);
                    });
                }

                // Загружаем jobs параллельно если есть job-сообщения
                const jobIds = (messages || []).filter(m => m.type === 'job' && m.job_id).map(m => m.job_id);
                let jobMap = {};
                if (jobIds.length) {
                    const { data: jobs } = await supabaseClient
                        .from('jobs')
                        .select('id, address, status, started_at, finished_at, engineer_id, confirmed_by, planned_duration_hours, sk_count, servisnyy_id, district, sk_name, engineer:engineer_id(name)')
                        .in('id', jobIds);
                    (jobs || []).forEach(j => { jobMap[j.id] = j; });
                }

                const newMessages = (messages || []).map(m => ({
                    ...m,
                    job: m.job_id ? jobMap[m.job_id] : null,
                    read_receipts: receiptsMap[m.id] || []
                }));
                
                const existingIds = new Set(messengerState.messages.map(m => m.id));
                const actuallyNew = newMessages.filter(m => !existingIds.has(m.id));
                
                if (actuallyNew.length > 0 || messengerState.messages.length === 0) {
                    messengerState.messages = [...messengerState.messages, ...actuallyNew];
                    renderMessages();
                }
            } catch (err) {
                console.error('Error loading messages:', err);
                const el = document.getElementById('messages-list');
                if (el) el.innerHTML = '<div class="chat-loading">Ошибка загрузки сообщений</div>';
            }
        }

        function renderMessages() {
            const messagesList = document.getElementById('messages-list');
            if (!messagesList) return;
            if (!messengerState.messages.length) {
                messagesList.innerHTML = '<div class="no-chat" style="flex:none;padding:40px 0">Нет сообщений. Напишите первое!</div>';
                return;
            }

            const elevated = isElevatedUser();
            const isEng = isEngineer();

            // Очищаем только при первой загрузке, потом добавляем
            const isFirstRender = !messagesList.dataset.rendered;
            if (isFirstRender) {
                messagesList.innerHTML = '';
                messagesList.dataset.rendered = 'true';
            }

            let prevDate = messagesList.dataset.lastDate || null;
            const existingIds = new Set(
                Array.from(messagesList.querySelectorAll('[data-msg-id]')).map(el => el.dataset.msgId)
            );

            messengerState.messages.forEach(msg => {
                // Если сообщение уже отрендерено - обновляем только реакции
                if (existingIds.has(msg.id)) {
                    const reactions = msg.content?.reactions || {};
                    const currentUserId = currentUser?.id;
                    const reactionHtml = Object.entries(reactions).map(([emoji, users]) => {
                        const count = Array.isArray(users) ? users.length : 0;
                        if (count === 0) return '';
                        const isActive = Array.isArray(users) && users.includes(currentUserId);
                        return '<span class="msg-reaction' + (isActive ? ' active' : '') + '" onclick="addReaction(\'' + msg.id + '\', \'' + emoji + '\')">' + emoji + ' <b>' + count + '</b></span>';
                    }).filter(Boolean).join('');
                    const rxnBlock = document.getElementById('rxn-' + msg.id);
                    if (rxnBlock) {
                        rxnBlock.innerHTML = reactionHtml;
                    }
                    return;
                }

                const isOwn = msg.user_id === currentUser.id;
                const time = new Date(msg.created_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
                const dateStr = new Date(msg.created_at).toLocaleDateString('ru-RU', { day: 'numeric', month: 'long' });
                
                // Добавляем разделитель даты если нужно
                if (dateStr !== prevDate) {
                    prevDate = dateStr;
                    messagesList.insertAdjacentHTML('beforeend', '<div class="msg-date-sep">' + dateStr + '</div>');
                }

                let html = '';
                // JOB CARD
                if (msg.type === 'job' && msg.job) {
                    const job = msg.job;
                    const statusMap = { pending: { label: 'Не начато', color: '#6B7280' }, active: { label: 'В работе', color: '#F59E0B' }, done: { label: 'Завершено', color: '#10B981' } };
                    const s = statusMap[job.status] || statusMap.pending;
                    const confirmedBadge = job.confirmed_by ? '<span style="color:#3B82F6;font-size:11px">👁 Подтверждено</span>' : '';
                    const startedAt = job.started_at ? new Date(job.started_at).toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' }) : '';
                    const planLabel = job.planned_duration_hours ? '⏱ План: ' + job.planned_duration_hours + 'ч' : '';
                    const isOverdue = job.status === 'active' && job.started_at && (Date.now() - new Date(job.started_at)) > (job.planned_duration_hours || 2) * 60 * 60 * 1000;
                    const overdueLabel = isOverdue ? ' · <span style="color:#EF4444">‼️ Просрочено</span>' : '';
                    const blinkStyle = isOverdue ? 'animation:blink 1s infinite;border:1px solid rgba(239,68,68,0.5);' : '';
                    const canConfirm = elevated && job.status === 'active' && !job.confirmed_by;
                    const canFinish = (isEng || isOwn) && job.status === 'active';
                    const canDelete = elevated; // Руководитель и техподдержка могут удалять
                    const actions = [
                        canConfirm ? '<button class="job-action-btn job-btn-confirm" onclick="confirmJob(\'' + job.id + '\')">👁 Подтвердить</button>' : '',
                        canFinish ? '<button class="job-action-btn job-btn-finish" onclick="finishJob(\'' + job.id + '\')">✅ Завершить</button>' : '',
                        canDelete ? '<button class="job-action-btn job-btn-delete" onclick="deleteJob(\'' + job.id + '\', \'' + msg.id + '\')" style="background:rgba(239,68,68,0.2);color:#EF4444">🗑 Удалить</button>' : ''
                    ].filter(Boolean).join('');
                    // Формируем строку с районом, СК и ID
                    const infoParts = [
                        job.district,
                        job.sk_name,
                        job.sk_count ? '❄️ ' + job.sk_count + ' СК' : '',
                        job.servisnyy_id ? 'ID: ' + job.servisnyy_id : ''
                    ].filter(Boolean);
                    const infoLine = infoParts.length ? '<div class="bubble-job-info" style="color:#aaa;font-size:12px;margin-top:4px">' + infoParts.join(' • ') + '</div>' : '';
                    html = [
                        '<div class="bubble-job ' + (isOwn ? 'own' : '') + '" style="' + blinkStyle + '" data-msg-id="' + msg.id + '">',
                        '  <div class="bubble-job-address">📍 ' + job.address + '</div>',
                        infoLine,
                        '  <div class="bubble-job-engineer">👷 ' + (job.engineer?.name || 'Инженер') + (startedAt ? ' • ' + startedAt : '') + (planLabel ? ' • ' + planLabel : '') + overdueLabel + '</div>',
                        '  <div class="bubble-job-status"><span class="dot" style="background:' + s.color + '"></span><span style="color:' + s.color + '">' + s.label + '</span>' + confirmedBadge + '</div>',
                        actions ? '  <div class="bubble-job-actions">' + actions + '</div>' : '',
                        '</div>'
                    ].join('');
                } else {
                    // Regular text message
                    const reactions = msg.content?.reactions || {};
                    const currentUserId = currentUser?.id;
                    const reactionHtml = Object.entries(reactions).map(([emoji, users]) => {
                        const count = Array.isArray(users) ? users.length : 0;
                        if (count === 0) return '';
                        const isActive = Array.isArray(users) && users.includes(currentUserId);
                        return '<span class="msg-reaction' + (isActive ? ' active' : '') + '" onclick="addReaction(\'' + msg.id + '\', \'' + emoji + '\')">' + emoji + ' <b>' + count + '</b></span>';
                    }).filter(Boolean).join('');

                    // Quote / reply block
                    let quotedHtml = '';
                    if (msg.content?.reply_to) {
                        const rt = msg.content.reply_to;
                        quotedHtml = '<div class="msg-quoted"><b>' + (rt.sender || '') + '</b>' + (rt.text || '').slice(0, 100) + (rt.text && rt.text.length > 100 ? '…' : '') + '</div>';
                    }
                    
                    // Read receipts - галочки прочтения
                    const readReceipts = msg.read_receipts || [];
                    const otherMembersCount = messengerState.chats.find(c => c.chat_id === messengerState.selectedChat?.chat_id)?.membersCount || 1;
                    const allRead = readReceipts.length >= otherMembersCount;
                    const ticksHtml = isOwn ? '<span class="cl-ticks' + (allRead ? ' read' : '') + '" title="' + (allRead ? 'Прочитано' : 'Доставлено') + '">' + (allRead ? '✓✓' : '✓') + '</span>' : '';
                    
                    // Кнопка удаления (только для своих сообщений или manager)
                    const canDelete = isOwn || currentUserProfile?.role === 'manager';
                    const deleteBtn = canDelete ? '<span class="msg-delete-trigger" onclick="showDeleteMessageMenu(' + msg.id + ', ' + isOwn + ', event)">🗑️</span>' : '';
                                        
                    html = [
                        '<div class="msg-bubble ' + (isOwn ? 'own' : '') + '" data-msg-id="' + msg.id + '">',
                        isOwn ? '' : '<strong>' + (msg.sender?.name || 'Неизвестный') + '</strong>',
                        quotedHtml,
                        '<span>' + (getMsgText(msg.content) || '') + '</span>',
                        reactionHtml ? '<div class="msg-reactions" id="rxn-' + msg.id + '">' + reactionHtml + '</div>' : '<div class="msg-reactions" id="rxn-' + msg.id + '"></div>',
                        '<small>' + time + ' ' + ticksHtml + '</small>',
                        '<span class="msg-react-trigger" onclick="showReactionPicker(' + msg.id + ', event)">😀</span>',
                        deleteBtn,
                        '</div>'
                    ].join('');
                }
                messagesList.insertAdjacentHTML('beforeend', html);
            });

            messagesList.dataset.lastDate = prevDate || '';
            messagesList.scrollTop = messagesList.scrollHeight;
            
            // Добавляем touch-обработчики для мобильных
            document.querySelectorAll('.msg-bubble').forEach(bubble => {
                bubble.addEventListener('touchstart', function() {
                    this.classList.add('touch-active');
                }, { passive: true });
                bubble.addEventListener('touchend', function() {
                    setTimeout(() => this.classList.remove('touch-active'), 500);
                }, { passive: true });
            });
        }

        // Отметка сообщений как прочитанных
        async function markMessagesAsRead(chatId) {
            try {
                await supabaseClient.rpc('mark_chat_messages_as_read', { chat_id_param: chatId });
                console.log('✅ Messages marked as read');
            } catch (e) {

            }
        }

        function subscribeToMessages(chatId) {
            // Отписываемся от предыдущих каналов
            if (messengerState.messagesSub) {
                messengerState.messagesSub.unsubscribe();
                messengerState.messagesSub = null;
            }
            if (messengerState.jobsSub) {
                messengerState.jobsSub.unsubscribe();
                messengerState.jobsSub = null;
            }
            // Очищаем polling
            if (window._fastPollInterval) {
                clearInterval(window._fastPollInterval);
                window._fastPollInterval = null;
            }

            // ---- Realtime: новые сообщения ----
            messengerState.messagesSub = supabaseClient
                .channel('messages:' + chatId)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages',
                    filter: 'chat_id=eq.' + chatId
                }, async (payload) => {
                    console.log('📨 Realtime INSERT received:', payload);
                    const newMsg = payload.new;
                    if (!newMsg) return;
                    // НЕ пропускаем свои - показываем подтверждение доставки
                    // Дедупликация
                    if (messengerState.messages.some(m => m.id === newMsg.id)) {
                        console.log('⚠️ Message already exists, skipping');
                        return;
                    }

                    if (newMsg.type === 'job' && newMsg.job_id) {
                        await loadMessages(chatId);
                    } else {
                        let senderName = 'Пользователь';
                        const cached = messengerState.messages.find(m => m.user_id === newMsg.user_id && m.sender?.name);
                        if (cached) {
                            senderName = cached.sender.name;
                        } else {
                            const { data: u } = await supabaseClient.from('users').select('name').eq('id', newMsg.user_id).single();
                            if (u) senderName = u.name;
                        }
                        messengerState.messages.push({ ...newMsg, sender: { name: senderName } });
                        renderMessages();
                    }
                })
                // ---- Realtime: обновления прочтений ----
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'message_read_receipts',
                    filter: 'user_id=eq.' + currentUser.id
                }, async (payload) => {
                    const receipt = payload.new;
                    console.log('📖 Message read by user:', receipt.user_id, 'message:', receipt.message_id);
                    
                    // Обновляем read_receipts у сообщения
                    const msgIndex = messengerState.messages.findIndex(m => m.id === receipt.message_id);
                    if (msgIndex > -1) {
                        const msg = messengerState.messages[msgIndex];
                        if (!msg.read_receipts) msg.read_receipts = [];
                        
                        // Проверяем есть ли уже эта запись
                        const exists = msg.read_receipts.some(r => r.user_id === receipt.user_id);
                        if (!exists) {
                            msg.read_receipts.push({
                                id: receipt.id,
                                user_id: receipt.user_id,
                                read_at: receipt.read_at,
                                users: { name: receipt.users?.name || 'Пользователь' }
                            });
                            renderMessages();
                        }
                    }
                })
                // ---- Realtime: обновления сообщений (реакции и т.д.) ----
                .on('postgres_changes', {
                    event: 'UPDATE',
                    schema: 'public',
                    table: 'messages',
                    filter: 'chat_id=eq.' + chatId
                }, async (payload) => {
                    const updatedMsg = payload.new;
                    if (!updatedMsg) return;
                    // Находим сообщение в локальном состоянии и обновляем
                    const idx = messengerState.messages.findIndex(m => m.id === updatedMsg.id);
                    if (idx > -1) {
                        messengerState.messages[idx] = { ...messengerState.messages[idx], ...updatedMsg };
                        renderMessages();
                    }
                })
                .subscribe((status) => {
                    console.log('📡 Realtime subscription status:', status);
                    if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT' || status === 'CLOSED') {
                        console.warn('⚠️ Realtime failed, starting aggressive polling');
                        _startAggressivePoll(chatId);
                    }
                    if (status === 'SUBSCRIBED') {
                        console.log('✅ Realtime connected');
                        if (window._aggressivePollInterval) {
                            clearInterval(window._aggressivePollInterval);
                            window._aggressivePollInterval = null;
                        }
                    }
                });

            // ---- Realtime: обновления jobs ----
            messengerState.jobsSub = supabaseClient
                .channel('jobs-for-chat:' + chatId)
                .on('postgres_changes', {
                    event: '*',
                    schema: 'public',
                    table: 'jobs',
                    filter: 'chat_id=eq.' + chatId
                }, async (payload) => {
                    console.log('🔔 Job changed:', payload.eventType, payload.new);
                    await loadMessages(chatId);
                    updateActiveJobsBanner(chatId);
                })
                .subscribe();

            // ---- Typing broadcast ----
            subscribeToTyping(chatId);

            // ---- Realtime подписка на все чаты для обновления unread badges ----
            subscribeToAllChatsUnread();

            // ---- Быстрый polling (2 секунды) — всегда работает как резерв ----
            _startFallbackPoll(chatId);

            // ---- visibilitychange: при возврате вкладки — быстрый догоняющий poll ----
            if (!window._visibilityHandlerSet) {
                window._visibilityHandlerSet = true;
                document.addEventListener('visibilitychange', () => {
                    if (document.visibilityState === 'visible') {
                        const cid = messengerState.selectedChat?.chat_id;
                        if (cid) {
                            loadMessages(cid); // Полная перезагрузка при возврате
                            // Не запускаем polling если Realtime работает
                            if (!messengerState.messagesSub) {
                                _startAggressivePoll(cid);
                            }
                        }
                    } else {
                        // Вкладка скрыта — останавливаем polling
                        if (window._aggressivePollInterval) {
                            clearInterval(window._aggressivePollInterval);
                            window._aggressivePollInterval = null;
                        }
                    }
                });
            }
        }

        // Агрессивный polling (1 секунда) — когда Realtime не работает
        function _startAggressivePoll(chatId) {
            if (window._aggressivePollInterval) return;
            console.log('🔄 Starting aggressive poll for chat:', chatId);
            window._aggressivePollInterval = setInterval(async () => {
                if (messengerState.selectedChat?.chat_id !== chatId || document.hidden) {
                    clearInterval(window._aggressivePollInterval);
                    window._aggressivePollInterval = null;
                    return;
                }
                await loadMessages(chatId);
            }, 1000);
        }

        // Fallback polling (2 секунды) — всегда работает как резерв Realtime
        function _startFallbackPoll(chatId) {
            if (window._fallbackPollInterval) return;
            window._fallbackPollInterval = setInterval(async () => {
                if (messengerState.selectedChat?.chat_id !== chatId || document.hidden) {
                    clearInterval(window._fallbackPollInterval);
                    window._fallbackPollInterval = null;
                    return;
                }
                // Полная перезагрузка сообщений каждые 2 секунды
                await loadMessages(chatId);
            }, 2000);
        }

        // Одиночный догоняющий запрос: загружает сообщения новее последнего известного
        let _pollCounter = 0;
        async function _catchUpPoll(chatId) {
            try {
                _pollCounter++;
                // Каждые 5 циклов (2 секунды) — полная перезагрузка для обновления реакций
                if (_pollCounter % 5 === 0) {
                    await loadMessages(chatId);
                    return;
                }
                const lastMsg = messengerState.messages[messengerState.messages.length - 1];
                const since = lastMsg?.created_at || new Date(0).toISOString();
                const { data: fresh } = await supabaseClient
                    .from('messages')
                    .select('id, content, created_at, user_id, type, job_id, sender:user_id(name)')
                    .eq('chat_id', chatId)
                    .gt('created_at', since)
                    .order('created_at', { ascending: true })
                    .limit(50);
                if (!fresh || fresh.length === 0) return;
                const existingIds = new Set(messengerState.messages.map(m => m.id));
                const toAdd = fresh.filter(m => !existingIds.has(m.id));
                if (toAdd.length > 0) {
                    messengerState.messages.push(...toAdd);
                    renderMessages();
                }
            } catch (e) { /* silent */ }
        }

        let _typingTimeout = null;
        let _typingChannel = null;

        window.handleTyping = function() {
            const chatId = messengerState.selectedChat?.chat_id;
            if (!chatId) return;
            
            // Отправляем событие typing
            if (!_typingChannel) {
                _typingChannel = supabaseClient.channel('typing:' + chatId);
                _typingChannel.subscribe();
            }
            _typingChannel.send({
                type: 'broadcast',
                event: 'typing',
                payload: { user_id: currentUser.id, name: currentUserProfile?.name || 'Пользователь', chat_id: chatId }
            }).catch(() => {});

            // Очищаем предыдущий таймаут
            if (_typingTimeout) clearTimeout(_typingTimeout);
            // Через 2 секунды отправляем stopped
            _typingTimeout = setTimeout(() => {
                if (_typingChannel) {
                    _typingChannel.send({
                        type: 'broadcast',
                        event: 'stopped',
                        payload: { user_id: currentUser.id, chat_id: chatId }
                    }).catch(() => {});
                }
            }, 2000);
        };

        window.subscribeToTyping = function(chatId) {
            if (window._typingSub) window._typingSub.unsubscribe();
            window._typingSub = supabaseClient.channel('typing:' + chatId)
                .on('broadcast', { event: 'typing' }, (msg) => {
                    if (msg.payload?.user_id === currentUser.id) return;
                    const indicator = document.getElementById('typing-indicator');
                    if (indicator) {
                        indicator.textContent = (msg.payload?.name || 'Собеседник') + ' пишет...';
                        indicator.style.display = 'block';
                    }
                })
                .on('broadcast', { event: 'stopped' }, (msg) => {
                    if (msg.payload?.user_id === currentUser.id) return;
                    const indicator = document.getElementById('typing-indicator');
                    if (indicator) indicator.style.display = 'none';
                })
                .subscribe();
        };

        // Подписка на сообщения во всех чатах для обновления unread badges
        window.subscribeToAllChatsUnread = function() {
            if (window._allChatsSub) window._allChatsSub.unsubscribe();
            
            const userId = currentUser?.id;
            if (!userId) return;
            
            console.log('📡 Subscribing to all chats for unread updates...');
            
            window._allChatsSub = supabaseClient
                .channel('all-chats-unread:' + userId)
                .on('postgres_changes', {
                    event: 'INSERT',
                    schema: 'public',
                    table: 'messages'
                }, async (payload) => {
                    const newMsg = payload.new;
                    if (!newMsg) return;
                    
                    console.log('📨 Realtime message received:', newMsg.chat_id, 'from', newMsg.user_id);
                    
                    // Пропускаем свои сообщения
                    if (newMsg.user_id === userId) {
                        console.log('📨 Skipping own message');
                        return;
                    }
                    
                    // Проверяем, что сообщение из чата где пользователь участник
                    const isMember = messengerState.chats.some(c => c.chat_id === newMsg.chat_id);
                    if (!isMember) {
                        console.log('📨 Not a member of this chat');
                        return;
                    }
                    
                    // Если чат не активен - увеличиваем счётчик
                    if (messengerState.selectedChat?.chat_id !== newMsg.chat_id) {
                        // Инициализируем chatUnread если нужно
                        if (!messengerState.chatUnread) messengerState.chatUnread = {};
                        
                        const currentUnread = messengerState.chatUnread[newMsg.chat_id] || 0;
                        messengerState.chatUnread[newMsg.chat_id] = currentUnread + 1;
                        
                        console.log('📨 Updating unread badge, total:', Object.values(messengerState.chatUnread).reduce((a,b) => a+b, 0));
                        
                        updateChatsUnreadBadge();
                        
                        // Обновляем lastMsg для чата
                        const chat = messengerState.chats.find(c => c.chat_id === newMsg.chat_id);
                        if (chat) {
                            chat.lastMsg = newMsg;
                        }
                        
                        // Перерендериваем список чатов
                        renderChatList();
                    }
                })
                .subscribe((status) => {
                    console.log('📡 All chats unread subscription:', status);
                    if (status === 'SUBSCRIBED') {
                        console.log('✅ Successfully subscribed to messages channel');
                    } else if (status === 'CHANNEL_ERROR' || status === 'TIMED_OUT') {
                        console.warn('⚠️ Realtime subscription failed, starting polling fallback');
                        startUnreadPolling();
                    }
                });
        };
        
        // Fallback polling для обновления непрочитанных
        let unreadPollingInterval = null;
        function startUnreadPolling() {
            if (unreadPollingInterval) clearInterval(unreadPollingInterval);
            
            unreadPollingInterval = setInterval(async () => {
                if (!messengerState.chats.length) return;
                
                try {
                    const chatIds = messengerState.chats.map(c => c.chat_id);
                    let totalUnread = 0;
                    
                    for (const chatId of chatIds) {
                        const lastSeen = getLastSeen('chat', chatId);
                        const { count, error } = await supabaseClient
                            .from('messages')
                            .select('id', { count: 'exact', head: true })
                            .eq('chat_id', chatId)
                            .gt('created_at', lastSeen)
                            .neq('user_id', currentUser.id);
                        
                        if (!error && count > 0) {
                            if (!messengerState.chatUnread) messengerState.chatUnread = {};
                            messengerState.chatUnread[chatId] = count;
                            totalUnread += count;
                        }
                    }
                    
                    updateChatsUnreadBadge();
                    renderChatList();
                } catch (e) {
                    console.error('Unread polling error:', e);
                }
            }, 10000); // каждые 10 секунд
        }

        // ============ Reply / Quote state ============
        window.setReplyTo = function(msgId) {
            const msg = messengerState.messages.find(m => m.id === msgId);
            if (!msg) return;
            messengerState.replyTo = {
                id: msgId,
                text: msg.content?.text || '',
                sender: msg.sender?.name || (msg.user_id === currentUser.id ? 'Вы' : 'Пользователь')
            };
            const bar = document.getElementById('reply-bar');
            if (!bar) return;
            bar.innerHTML = [
                '<div class="msg-reply-bar">',
                '  <span>Ответ — <b>' + messengerState.replyTo.sender + '</b>: ' + messengerState.replyTo.text.slice(0, 80) + (messengerState.replyTo.text.length > 80 ? '…' : '') + '</span>',
                '  <button class="msg-reply-cancel" onclick="clearReply()">×</button>',
                '</div>'
            ].join('');
            document.getElementById('message-input')?.focus();
        };

        window.clearReply = function() {
            if (messengerState) messengerState.replyTo = null;
            const bar = document.getElementById('reply-bar');
            if (bar) bar.innerHTML = '';
        };

        window.sendMessage = async function() {
            const input = document.getElementById('message-input');
            const text = input?.value?.trim();
            if (!text || !messengerState.selectedChat) return;

            const msgContent = { text };
            if (messengerState.replyTo) {
                msgContent.reply_to = { ...messengerState.replyTo };
            }

            try {
                const { data, error } = await supabaseClient
                    .from('messages')
                    .insert({
                        chat_id: messengerState.selectedChat.chat_id,
                        user_id: currentUser.id,
                        content: msgContent
                    })
                    .select(`
                        id,
                        content,
                        created_at,
                        user_id,
                        sender:user_id(name)
                    `)
                    .single();

                if (error) throw error;
                clearReply();

                // Добавляем сообщение сразу (оптимистичное обновление)
                const exists = messengerState.messages.some(m => m.id === data.id);
                if (!exists) {
                    messengerState.messages.push(data);
                    renderMessages();
                    // Прокручиваем к новому сообщению
                    const messagesList = document.getElementById('messages-list');
                    if (messagesList) messagesList.scrollTop = messagesList.scrollHeight;
                }
                input.value = '';

                // Отправить Web Push всем участникам чата (fire & forget)
                const senderName = currentUserProfile?.name || 'Новое сообщение';
                const { data: { session: sendSession } } = await supabaseClient.auth.getSession();
                const sendToken = sendSession?.access_token || localStorage.getItem('token');
                
                console.log('🔔 Sending push notification:', {
                    chat_id: messengerState.selectedChat.chat_id,
                    sender_name: senderName,
                    text: text,
                    exclude_user_id: currentUser.id
                });
                console.log('🔑 Push token:', sendToken ? `${sendToken.substring(0, 20)}...` : 'NO TOKEN');
                
                // 1. Отправляем Web Push
                fetch(`${SUPABASE_URL}/functions/v1/push-send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${sendToken}`
                    },
                    body: JSON.stringify({
                        chat_id: messengerState.selectedChat.chat_id,
                        sender_name: senderName,
                        text: text,
                        exclude_user_id: currentUser.id
                    })
                }).then(async r => {
                    console.log('🔔 Push response status:', r.status);
                    if (!r.ok) {
                        const err = await r.text();
                        console.warn('❌ Push send failed:', r.status, err);
                    } else {
                        const data = await r.json();
                        console.log('✅ Push sent successfully:', data);
                    }
                }).catch(e => console.error('❌ Push send error:', e));
                
                // 2. Добавляем в notification_queue для offline пользователей
                try {
                    const { data: members } = await supabaseClient
                        .from('chat_members')
                        .select('user_id')
                        .eq('chat_id', messengerState.selectedChat.chat_id)
                        .neq('user_id', currentUser.id);
                    
                    for (const member of members || []) {
                        await supabaseClient.from('notification_queue').insert({
                            user_id: member.user_id,
                            title: senderName,
                            body: text.length > 100 ? text.slice(0, 100) + '…' : text,
                            type: 'message',
                            sent: false
                        });
                    }
                } catch (e) {
                    console.warn('Notification queue error:', e);
                }

            } catch (err) {
                console.error('Error sending message:', err);
                showToast('Ошибка отправки сообщения');
            }
        }

        // ============================================================
        window.showReactionPicker = function(msgId, event) {
            const existing = document.getElementById('reaction-picker');
            if (existing) { existing.remove(); return; }
            
            const emojis = ['👍', '❤️', '😂', '😮', '😢', '🎉'];
            const picker = document.createElement('div');
            picker.id = 'reaction-picker';
            picker.className = 'reaction-picker';
            picker.innerHTML = emojis.map(e =>
                '<span onclick="addReaction(\'' + msgId + '\',\'' + e + '\');this.closest(\'.reaction-picker\').remove()">' + e + '</span>'
            ).join('');
            document.body.appendChild(picker);
            
            // Позиционирование относительно кнопки
            const btn = event?.target;
            const bubble = document.querySelector('[data-msg-id="' + msgId + '"]');
            const anchor = btn || bubble;
            if (anchor) {
                const rect = anchor.getBoundingClientRect();
                const pw = 280; // approx picker width
                let left = rect.left;
                if (left + pw > window.innerWidth) left = window.innerWidth - pw - 8;
                if (left < 8) left = 8;
                let top = rect.top - 52;
                if (top < 8) top = rect.bottom + 8;
                picker.style.left = left + 'px';
                picker.style.top = top + 'px';
            }
            
            // Закрыть по клику вне
            setTimeout(() => {
                function closePicker(e) {
                    if (!picker.contains(e.target)) {
                        picker.remove();
                        document.removeEventListener('click', closePicker);
                    }
                }
                document.addEventListener('click', closePicker);
            }, 50);
        };

        window.addReaction = async function(msgId, emoji) {
            const msg = messengerState.messages.find(m => m.id === msgId);
            if (!msg) return;
            if (!msg.content || typeof msg.content !== 'object') msg.content = { text: msg.content };
            
            const reactions = msg.content.reactions ? { ...msg.content.reactions } : {};
            if (!reactions[emoji]) reactions[emoji] = [];
            const userId = currentUser?.id;
            const userIdx = reactions[emoji].indexOf(userId);
            if (userIdx > -1) {
                reactions[emoji].splice(userIdx, 1);
                if (reactions[emoji].length === 0) delete reactions[emoji];
            } else {
                reactions[emoji].push(userId);
            }
            
            // Обновляем локальное состояние
            msg.content.reactions = reactions;
            
            // Быстро обновляем DOM без полного перерендера
            const rxnBlock = document.getElementById('rxn-' + msgId);
            if (rxnBlock) {
                rxnBlock.innerHTML = Object.entries(reactions).map(([em, users]) => {
                    const count = Array.isArray(users) ? users.length : 0;
                    if (count === 0) return '';
                    const isActive = Array.isArray(users) && users.includes(userId);
                    return '<span class="msg-reaction' + (isActive ? ' active' : '') + '" onclick="addReaction(\'' + msgId + '\',\'' + em + '\')">' + em + ' <b>' + count + '</b></span>';
                }).filter(Boolean).join('');
            }
            
            // Сохраняем в Supabase
            try {
                await supabaseClient
                    .from('messages')
                    .update({ content: { ...msg.content, reactions } })
                    .eq('id', msgId);
            } catch (err) {
                console.error('Error saving reaction:', err);
            }
        };

        window.toggleReaction = async function(msgId, emoji) {
            await addReaction(msgId, emoji);
        };

        // Удалить сообщение только у себя (добавить в deleted_for)
        window.deleteMessageForMe = async function(msgId) {
            const menu = document.getElementById('delete-message-menu');
            if (menu) menu.remove();
            
            try {
                // Получаем текущий список deleted_for
                const { data: msg, error: fetchError } = await supabaseClient
                    .from('messages')
                    .select('deleted_for')
                    .eq('id', msgId)
                    .single();
                
                if (fetchError) throw fetchError;
                
                // Добавляем текущего пользователя в deleted_for
                const currentDeletedFor = msg.deleted_for || [];
                const userId = currentUser.id;
                
                if (currentDeletedFor.includes(userId)) {
                    showToast('Сообщение уже удалено');
                    return;
                }
                
                const newDeletedFor = [...currentDeletedFor, userId];
                
                const { error } = await supabaseClient
                    .from('messages')
                    .update({ deleted_for: newDeletedFor })
                    .eq('id', msgId);
                
                if (error) throw error;
                
                // Удаляем из локального состояния
                messengerState.messages = messengerState.messages.filter(m => m.id !== msgId);
                renderMessages();
                showToast('Сообщение удалено у вас');
                
            } catch (err) {
                console.error('deleteMessageForMe error:', err);
                showToast('Ошибка удаления: ' + (err.message || err));
            }
        };
        
        // Удалить сообщение у всех (полное удаление)
        window.deleteMessageForAll = async function(msgId) {
            const menu = document.getElementById('delete-message-menu');
            if (menu) menu.remove();
            
            if (!confirm('Удалить сообщение у всех участников чата?')) return;
            
            try {
                const { error } = await supabaseClient
                    .from('messages')
                    .delete()
                    .eq('id', msgId);
                
                if (error) throw error;
                
                // Удаляем из локального состояния
                messengerState.messages = messengerState.messages.filter(m => m.id !== msgId);
                renderMessages();
                showToast('Сообщение удалено');
                
            } catch (err) {
                console.error('deleteMessageForAll error:', err);
                showToast('Ошибка удаления: ' + (err.message || err));
            }
        };

        // Свайп влево — пикер реакций; свайп вправо — ответить
        (function setupSwipeReactions() {
            let touchStartX = 0, touchStartY = 0, swipedBubble = null, swipeDir = null;
            document.addEventListener('touchstart', function(e) {
                touchStartX = e.touches[0].clientX;
                touchStartY = e.touches[0].clientY;
                swipedBubble = null; swipeDir = null;
            }, { passive: true });
            document.addEventListener('touchmove', function(e) {
                const dx = e.touches[0].clientX - touchStartX;
                const dy = e.touches[0].clientY - touchStartY;
                if (Math.abs(dy) > Math.abs(dx)) return; // вертикальный скролл
                const bubble = e.target.closest('.msg-bubble');
                if (!bubble) return;
                if (dx < -30) {
                    swipedBubble = bubble; swipeDir = 'left';
                    bubble.classList.add('swiped');
                } else if (dx > 40) {
                    swipedBubble = bubble; swipeDir = 'right';
                    bubble.style.transition = 'transform 0.1s ease-out';
                    bubble.style.transform = 'translateX(8px)';
                } else if (Math.abs(dx) < 10 && swipedBubble) {
                    swipedBubble.classList.remove('swiped');
                    swipedBubble.style.transform = '';
                    swipedBubble = null; swipeDir = null;
                }
            }, { passive: true });
            document.addEventListener('touchend', function(e) {
                if (!swipedBubble) return;
                const msgId = swipedBubble.dataset.msgId;
                const dir = swipeDir;
                swipedBubble.classList.remove('swiped');
                swipedBubble.style.transition = '';
                swipedBubble.style.transform = '';
                const bub = swipedBubble;
                swipedBubble = null; swipeDir = null;
                if (!msgId) return;
                if (dir === 'left') {
                    setTimeout(() => {
                        showReactionPicker(msgId, { target: document.querySelector('[data-msg-id="' + msgId + '"] .msg-react-trigger') });
                    }, 150);
                } else if (dir === 'right') {
                    setTimeout(() => setReplyTo(msgId), 100);
                }
            });
        })();

        // LONG-PRESS on msg bubble → context menu (reply, react)
        (function setupBubbleLongPress() {
            let lpTimer = null, lpBubble = null;
            document.addEventListener('touchstart', function(e) {
                const bubble = e.target.closest('.msg-bubble');
                if (!bubble) return;
                lpBubble = bubble;
                lpTimer = setTimeout(() => {
                    const msgId = bubble.dataset.msgId;
                    if (!msgId) return;
                    showMsgContextMenu(msgId, e.touches[0]);
                }, 550);
            }, { passive: true });
            document.addEventListener('touchend',  () => { clearTimeout(lpTimer); lpTimer = null; });
            document.addEventListener('touchmove', () => { clearTimeout(lpTimer); lpTimer = null; }, { passive: true });
            // Desktop: right-click on bubble
            document.addEventListener('contextmenu', function(e) {
                const bubble = e.target.closest('.msg-bubble');
                if (!bubble) return;
                e.preventDefault();
                showMsgContextMenu(bubble.dataset.msgId, e);
            });
        })();

        window.showMsgContextMenu = function(msgId, touch) {
            document.getElementById('msgCtxMenu')?.remove();
            const msg = messengerState.messages.find(m => m.id === msgId);
            if (!msg) return;

        window.showUserProfile = async function(userId, infoSection, statusEl) {
            try {
                const { data: u } = await supabaseClient.from('users').select('name, phone, username, birthday, last_seen, role').eq('id', userId).single();
                if (!u) return;

                // Online status
                if (statusEl) {
                    const diff = u.last_seen_at ? Date.now() - new Date(u.last_seen_at).getTime() : Infinity;
                    statusEl.textContent = diff < 3 * 60 * 1000 ? 'в сети' : ('Был ' + (u.last_seen_at ? new Date(u.last_seen_at).toLocaleDateString('ru-RU', { day:'numeric', month:'short' }) : ''));
                    if (diff < 3 * 60 * 1000) statusEl.style.color = '#34C759';
                    else statusEl.classList.add('offline');
                }

                if (!infoSection) return;
                let rows = '';
                if (u.phone) rows += '<div class="upc-row"><div><div class="upc-row-label">Телефон</div><div class="upc-row-value">' + u.phone + '</div></div></div>';
                if (u.username) rows += '<div class="upc-row"><div><div class="upc-row-label">Username</div><div class="upc-row-value">@' + u.username + '</div></div><div class="upc-row-icon">📲</div></div>';
                if (u.birthday) {
                    const bd = new Date(u.birthday);
                    const age = Math.floor((Date.now() - bd) / (365.25 * 24 * 3600 * 1000));
                    rows += '<div class="upc-row"><div><div class="upc-row-label">Дата рождения</div><div class="upc-row-value">' + bd.toLocaleDateString('ru-RU') + (age ? ' (' + age + ' лет)' : '') + '</div></div></div>';
                }
                if (u.role) rows += '<div class="upc-row"><div><div class="upc-row-label">Роль</div><div class="upc-row-value">' + u.role + '</div></div></div>';
                if (rows) infoSection.innerHTML += rows;
            } catch(e) { console.warn('showUserProfile error', e); }
        };

                    .from('users')

                    .not('id', 'eq', currentUserProfile.id)
                    .order('name');

        window.confirmAddMembers = async function(chatId) {
            const checked = [...document.querySelectorAll('#addMembersModal input[type=checkbox]:checked')];
            
            if (!checked.length) {
                showToast('⚠️ Выберите хотя бы одного пользователя');
                return;
            }
            
            const memberIds = checked.map(c => c.value);
            
            try {
                const membersInsert = memberIds.map(uid => ({ chat_id: chatId, user_id: uid }));
                
                console.log('🔵 Inserting members:', { chatId, memberIds, membersInsert });
                
                const { error } = await supabaseClient
                    .from('chat_members')
                    .insert(membersInsert);
                
                if (error) {
                    console.error('Error adding members:', error);
                    throw error;

                showToast(`✅ Добавлено ${memberIds.length} участник${memberIds.length === 1 ? '' : memberIds.length < 5 ? 'а' : 'ов'}`);

                    // DEBUG: показать реальный запрос в консоли

                    if (r1.error) { loadError = r1.error.message || r1.error.code || JSON.stringify(r1.error); }
                    if (r2.error) { loadError = loadError || r2.error.message || r2.error.code || JSON.stringify(r2.error); }
                    const countSk = (a, keys) => keys.filter(k => a[k]).length;
                    // Гибкий поиск lat/lng по разным вариантам названий колонок
                    const getLat = a => a.lat ?? a.shirota ?? a.latitude ?? a.y_coord ?? null;

            const shown = filtered.slice(0, 80);
            if (!shown.length) {

                        searchQuery = address;
                    }
                    const geoRes = await fetch('https://api.mapbox.com/geocoding/v5/mapbox.places/' + encodeURIComponent(searchQuery) + '.json?access_token=pk.eyJ1IjoidGtvbHlhIiwiYSI6ImNtbXZ0eGI1ODJkbnIycXNkMTBteWNvd20ifQ.m0WVg1Ix7RuR3AJyHDHRtg&limit=1');
                    const geoData = await geoRes.json();
                    if (geoData.features?.[0]?.center) {

        // Проверяем нужно ли обновить данные (раз в сутки в 6 утра)
        function shouldUpdateMapJobs() {
            const now = new Date();
            const lastUpdate = window.mapJobsState.lastUpdate ? new Date(window.mapJobsState.lastUpdate) : null;
            
            if (!lastUpdate) return true;
            
            // Проверяем прошло ли время с последнего обновления
            const hoursSinceUpdate = (now - lastUpdate) / (1000 * 60 * 60);
            
            // Обновляем если прошло больше 24 часов ИЛИ если сейчас после 6 утра а последнее обновление было до 6 утра
            if (hoursSinceUpdate >= 24) return true;
            
            const currentHour = now.getHours();
            const lastUpdateHour = lastUpdate.getHours();
            const isSameDay = now.toDateString() === lastUpdate.toDateString();
            
            // Если сейчас после 6 утра, а последнее обновление было до 6 утра или вчера
            if (currentHour >= 6 && (!isSameDay || lastUpdateHour < 6)) {
                return true;
            }
            
            return false;
        }

            if (error) {

                return window.mapJobsState.jobs; // Возвращаем кэш при ошибке

            window.mapJobsState.lastUpdate = new Date().toISOString();
            localStorage.setItem('mapJobsCache', JSON.stringify(window.mapJobsState.jobs));
