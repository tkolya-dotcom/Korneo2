        window.renderWarehouseList = function() {
            const search = (document.getElementById('warehouseSearch')?.value || '').toLowerCase();
            const category = document.getElementById('warehouseCategory')?.value || 'all';
            const stock = document.getElementById('warehouseStock')?.value || 'all';
            
            // Убираем дубликаты материалов по id
            const uniqueMaterialsMap = new Map();
            window.warehouseMaterials.forEach(m => {
                if (!uniqueMaterialsMap.has(m.id)) {
                    uniqueMaterialsMap.set(m.id, m);
                }
            });
            const uniqueMaterials = Array.from(uniqueMaterialsMap.values());
            
            let filtered = uniqueMaterials.map(m => {
                const w = window.warehouseData.find(w => w.material_id === m.id);
                return { ...m, qty: w ? w.quantity_available : 0 };
            });
            
            // Фильтр по поиску
            if (search) {
                filtered = filtered.filter(m => m.name.toLowerCase().includes(search));
            }
            
            // Фильтр по категории
            if (category !== 'all') {
                filtered = filtered.filter(m => m.category === category);
            }
            
            // Фильтр по наличию
            if (stock === 'instock') {
                filtered = filtered.filter(m => m.qty > 0);
            } else if (stock === 'outstock') {
                filtered = filtered.filter(m => m.qty === 0);
            }
            
            // Группируем по категориям
            const categories = {};
            filtered.forEach(m => {
                if (!categories[m.category]) categories[m.category] = [];
                categories[m.category].push(m);
            });
            
            const warehouseList = document.getElementById('warehouseList');
            if (!warehouseList) return;
            
            if (Object.keys(categories).length === 0) {
                warehouseList.innerHTML = '<div class="empty-state"><div class="empty-state-icon">📦</div><p>Нет материалов</p></div>';
                return;
            }
            
            let html = '';
            Object.keys(categories).forEach(category => {
                html += `
                    <div class="card" style="margin-bottom:12px">
                        <h4 style="margin:0 0 8px 0;color:#00D9FF;font-size:14px">${category}</h4>
                        <table style="width:100%;border-collapse:collapse;font-size:13px">
                            <tbody>
                `;
                
                categories[category].forEach(m => {
                    html += `
                        <tr style="border-bottom:1px solid rgba(255,255,255,0.05)">
                            <td style="padding:6px;color:#fff;cursor:pointer" onclick="showMaterialUsageInAVR('${m.id}', '${m.name.replace(/'/g, "\\'")}')">
                                <div style="font-weight:500;font-size:13px">${m.name}</div>
                            </td>
                            <td style="padding:6px;text-align:center;color:var(--text-muted);font-size:12px">${m.default_unit}</td>
                            <td style="padding:6px;text-align:right">
                                <span style="font-size:13px;font-weight:600;color:${m.qty > 0 ? '#00FF88' : '#EF4444'}">
                                    ${m.qty}
                                </span>
                            </td>
                            <td style="padding:4px 6px;text-align:right">
                                ${m.qty > 0 ? `<button onclick="quickIssueOne('${m.id}','${m.name.replace(/'/g, "\\'")}',${m.qty},'${m.default_unit||'шт'}')" style="padding:3px 8px;border-radius:5px;border:1px solid rgba(255,150,0,0.5);background:transparent;color:#FF9600;font-size:11px;cursor:pointer" title="Выдать">📤</button>` : ''}
                            </td>
                        </tr>
                    `;
                });
                
                html += `
                            </tbody>
                        </table>
                    </div>
                `;
            });
            
            warehouseList.innerHTML = html;
        };
        
        // Показ расхода материала по заявкам АВР
        window.showMaterialUsageInAVR = async function(materialId, materialName) {
            showModal('Загрузка...', '<div class="loading"><div class="dancing-loader"><div class="loader-head"></div><div class="loader-body"></div><div class="loader-arm-left"></div><div class="loader-arm-right"></div><div class="loader-leg-left"></div><div class="loader-leg-right"></div></div></div>');
            
            try {
                console.log('🔍 Searching for material usage:', materialId, materialName);
                
                // Загружаем позиции materials_requests с этим материалом
                const { data: mrItems } = await supabaseClient
                    .from('materials_request_items')
                    .select('id, request_id, quantity_requested, quantity_approved, material_id')
                    .eq('material_id', materialId)
                    .limit(200);

                const mrIds = [...new Set((mrItems || []).map(i => i.request_id).filter(Boolean))];
                
                let allMaterialsRequests = [];
                if (mrIds.length > 0) {
                    const { data: mrs } = await supabaseClient
                        .from('materials_requests')
                        .select('id, task_id, status, created_at')
                        .in('id', mrIds);
                    allMaterialsRequests = mrs || [];
                }
                const materialsRequests = allMaterialsRequests.map(mr => ({
                    ...mr,
                    items: (mrItems || []).filter(i => i.request_id === mr.id)
                })).filter(mr => mr.items.length > 0);
                
                // Прямой запрос позиций по material_id
                const { data: prItems } = await supabaseClient
                    .from('purchase_request_items')
                    .select('id, purchase_request_id, name, quantity, unit, note, material_id')
                    .eq('material_id', materialId)
                    .limit(200);

                const prIds = [...new Set((prItems || []).map(i => i.purchase_request_id).filter(Boolean))];
                
                let allPurchaseRequests = [];
                if (prIds.length > 0) {
                    const { data: prs } = await supabaseClient
                        .from('purchase_requests')
                        .select('id, task_avr_id, task_id, installation_id, status, created_at, receipt_address, short_id')
                        .in('id', prIds);
                    allPurchaseRequests = prs || [];
                }

                const purchaseRequests = allPurchaseRequests.map(pr => ({
                    ...pr,
                    items: (prItems || []).filter(i => i.purchase_request_id === pr.id)
                })).filter(pr => pr.items.length > 0);
                
                console.log('📦 Filtered Materials requests:', materialsRequests);
                console.log('📦 Filtered Purchase requests:', purchaseRequests);
                
                if ((!materialsRequests || materialsRequests.length === 0) && (!purchaseRequests || purchaseRequests.length === 0)) {
                    showModal('Расход материала', `
                        <div style="padding:20px;text-align:center">
                            <div style="font-size:48px;margin-bottom:16px">📦</div>
                            <h3 style="color:#fff;margin-bottom:8px">${materialName}</h3>
                            <p style="color:var(--text-muted)">Материал не использовался в заявках</p>
                        </div>
                    `);
                    return;
                }
                
                // Собираем информацию по заявкам
                let totalRequested = 0;
                let totalApproved = 0;
                const avrDetails = [];
                
                // Обрабатываем materials_requests
                if (materialsRequests && materialsRequests.length > 0) {
                    for (const request of materialsRequests) {
                        const item = request.items.find(i => i.material_id === materialId);
                        if (!item) continue;
                        
                        totalRequested += item.quantity_requested;
                        totalApproved += (item.quantity_approved || 0);
                        
                        // Загружаем задачу чтобы получить номер
                        if (request.task_id) {
                            const { data: task } = await supabaseClient
                                .from('tasks_avr')
                                .select('id, title, short_id, type')
                                .eq('id', request.task_id)
                                .single();
                            
                            if (task) {
                                avrDetails.push({
                                    taskId: task.id,
                                    taskNumber: task.short_id,
                                    taskTitle: task.title,
                                    taskType: task.type,
                                    requestId: request.id,
                                    requestType: 'materials_request',
                                    status: request.status,
                                    requested: item.quantity_requested,
                                    approved: item.quantity_approved || 0,
                                    used: item.quantity_issued || 0, // Добавляем использованное
                                    createdAt: request.created_at
                                });
                            }
                        }
                    }
                }
                
                // Обрабатываем purchase_requests
                if (purchaseRequests && purchaseRequests.length > 0) {
                    for (const request of purchaseRequests) {
                        const item = request.items.find(i => i.material_id === materialId);
                        if (!item) continue;
                        
                        totalRequested += item.quantity;
                        totalApproved += item.quantity; // Для purchase_requests считаем что одобрено = запрошено
                        
                        // Определяем тип задачи и загружаем данные
                        let taskData = null;
                        if (request.task_avr_id) {
                            taskData = await supabaseClient
                                .from('tasks_avr')
                                .select('id, title, short_id, type')
                                .eq('id', request.task_avr_id)
                                .single();
                        } else if (request.task_id) {
                            taskData = await supabaseClient
                                .from('tasks')
                                .select('id, title, short_id')
                                .eq('id', request.task_id)
                                .single();
                        } else if (request.installation_id) {
                            taskData = await supabaseClient
                                .from('installations')
                                .select('id, title, short_id')
                                .eq('id', request.installation_id)
                                .single();
                        }
                        
                        if (taskData?.data) {
                            avrDetails.push({
                                taskId: taskData.data.id,
                                taskNumber: taskData.data.short_id,
                                taskTitle: taskData.data.title,
                                taskType: taskData.data.type || 'installation',
                                requestId: request.id,
                                requestType: 'purchase_request',
                                status: request.status,
                                requested: item.quantity,
                                approved: item.quantity, // Для purchase_requests считаем что одобрено = запрошено
                                used: item.quantity_issued || 0, // Реальное использованное количество
                                createdAt: request.created_at
                            });
                        }
                    }
                }
                
                // Сортируем по номеру задачи
                avrDetails.sort((a, b) => (a.taskNumber || 0) - (b.taskNumber || 0));
                
                // Формируем HTML
                const usageHtml = avrDetails.map(avr => {
                    const typeLabels = { 'AVR': 'АВР', 'NRD': 'НРД', 'TECH_TASK': 'Тех. задача' };
                    const taskTypeDisplay = avr.requestType === 'purchase_request' ? 
                        (typeLabels[avr.taskType] || avr.taskType) : 
                        'Заявка на материалы';
                    
                    return `
                        <div style="background:rgba(255,255,255,0.05);padding:12px;border-radius:8px;margin-bottom:8px;cursor:pointer" 
                             onclick="${avr.requestType === 'purchase_request' ? `showAVRDetail('${avr.taskId}');document.getElementById('materialUsageModal')?.remove();` : `showAVRDetail('${avr.taskId}');document.getElementById('materialUsageModal')?.remove();`}">
                            <div style="display:flex;justify-content:space-between;align-items:start;margin-bottom:8px">
                                <div>
                                    <div style="font-weight:600;color:#fff;margin-bottom:4px">
                                        ${avr.taskNumber ? `<span style="background:var(--accent);color:white;padding:2px 6px;border-radius:4px;font-size:11px;margin-right:6px">#${String(avr.taskNumber).padStart(4, '0')}</span>` : ''}
                                        ${taskTypeDisplay} - ${avr.taskTitle}
                                    </div>
                                    <div style="font-size:11px;color:var(--text-muted)">
                                        📅 ${formatDate(avr.createdAt)} • Статус: <span class="status status-${avr.status}">${avr.status}</span>
                                    </div>
                                </div>
                                <div style="text-align:right">
                                    <div style="font-size:13px;color:#00D9FF;font-weight:600">
                                        Запрошено: ${avr.requested}
                                    </div>
                                    ${avr.approved > 0 && avr.requestType === 'materials_request' ? `
                                        <div style="font-size:13px;color:#00FF88;font-weight:600">
                                            Одобрено: ${avr.approved}
                                        </div>
                                    ` : ''}
                                    ${avr.used !== undefined && avr.used > 0 ? `
                                        <div style="font-size:13px;color:#FF6B00;font-weight:600">
                                            Использовано: ${avr.used}
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        </div>
                    `;
                }).join('');
                
                showModal('Расход материала', `
                    <div style="padding:20px">
                        <div style="margin-bottom:16px">
                            <h3 style="color:#fff;margin:0 0 8px 0">${materialName}</h3>
                            <div style="display:flex;gap:16px">
                                <div style="flex:1;background:rgba(0,217,255,0.1);padding:12px;border-radius:8px;text-align:center">
                                    <div style="font-size:11px;color:var(--text-muted)">Всего запрошено</div>
                                    <div style="font-size:20px;color:#00D9FF;font-weight:700">${totalRequested}</div>
                                </div>
                                <div style="flex:1;background:rgba(0,255,136,0.1);padding:12px;border-radius:8px;text-align:center">
                                    <div style="font-size:11px;color:var(--text-muted)">Всего одобрено</div>
                                    <div style="font-size:20px;color:#00FF88;font-weight:700">${totalApproved}</div>
                                </div>
                            </div>
                        </div>
                        
                        <h4 style="color:#fff;margin:0 0 12px 0;font-size:14px">Использовано в заявках (${avrDetails.length})</h4>
                        <div style="max-height:400px;overflow-y:auto">
                            ${usageHtml}
                        </div>
                    </div>
                `);
                
            } catch (error) {
                console.error('Error loading material usage:', error);
                showToast('Ошибка: ' + error.message);
                closeModal();
            }
        };

                            </div>
                        </form>
                    </div>
                </div>
            `;
            
            document.body.appendChild(modal);
            
            // Инициализация поиска материалов
            const searchInput = document.getElementById('materialSearch');
            const resultsDiv = document.getElementById('materialSearchResults');
            const selectedMaterialIdInput = document.getElementById('selectedMaterialId');
            const selectedMaterialNameDiv = document.getElementById('selectedMaterialName');
            const confirmBtn = document.getElementById('confirmAddMaterialBtn');
            
            let debounceTimer = null;
            
            searchInput.addEventListener('input', function(e) {
                const query = e.target.value.trim();
                
                // Очищаем предыдущий таймер
                clearTimeout(debounceTimer);
                
                // Начинаем поиск после ввода 1 буквы
                if (query.length < 1) {
                    resultsDiv.innerHTML = '';
                    return;
                }
                
                // Debounce 300ms для производительности
                debounceTimer = setTimeout(async () => {
                    try {
                        console.log('🔍 Searching for:', query);
                        
                        const { data: materials, error } = await supabaseClient
                            .from('materials')
                            .select('id, name, category, default_unit')
                            .filter('name', 'ilike', `%${query}%`)
                            .order('category')
                            .order('name')
                            .limit(10);
                        
                        console.log('Search results:', materials, 'Error:', error);
                        
                        if (error) {
                            console.error('Search error:', error);
                            resultsDiv.innerHTML = '<div style="padding:8px;color:#EF4444;font-size:13px">Ошибка поиска: ' + error.message + '</div>';
                            return;
                        }
                        
                        if (!materials || materials.length === 0) {
                            resultsDiv.innerHTML = '<div style="padding:8px;color:var(--text-muted);font-size:13px">Материалы не найдены</div>';
                            return;
                        }
                        
                        resultsDiv.innerHTML = materials.map(m => `
                            <div style="padding:8px;border-bottom:1px solid rgba(255,255,255,0.05);cursor:pointer;background:rgba(255,255,255,0.05)"
                                 onclick="selectMaterial('${m.id}', '${m.name.replace(/'/g, "\\'")}', '${m.category}', '${m.default_unit}')">
                                <div style="font-weight:500;color:#fff;font-size:13px">${m.name}</div>
                                <div style="font-size:11px;color:var(--text-muted)">${m.category} • Ед. изм: ${m.default_unit}</div>
                            </div>
                        `).join('');
                        
                    } catch (error) {
                        console.error('Search error:', error);
                        resultsDiv.innerHTML = '<div style="padding:8px;color:#EF4444;font-size:13px">Ошибка поиска</div>';
                    }
                }, 300);
            });
            
            // Функция выбора материала
            window.selectMaterial = function(id, name, category, unit) {
                selectedMaterialIdInput.value = id;
                selectedMaterialNameDiv.textContent = `${name} (${category})`;
                searchInput.value = '';
                resultsDiv.innerHTML = '';
                confirmBtn.disabled = false;
                
                // Визуальное подтверждение
                selectedMaterialNameDiv.style.background = 'rgba(0,255,136,0.15)';
                selectedMaterialNameDiv.style.color = '#00FF88';
                setTimeout(() => {
                    selectedMaterialNameDiv.style.background = 'rgba(0,217,255,0.1)';
                    selectedMaterialNameDiv.style.color = '#00D9FF';
                }, 300);
            };
            
            // Toggle manual material input
            window.toggleManualMaterialInput = function() {
                const container = document.getElementById('manualMaterialContainer');
                container.style.display = container.style.display === 'none' ? 'block' : 'none';
            };
            
            // Create manual material
            window.createManualMaterial = async function() {
                const name = document.getElementById('manualMaterialName').value.trim();
                const category = document.getElementById('manualMaterialCategory').value.trim() || 'Расходники';
                const unit = document.getElementById('manualMaterialUnit').value;
                
                if (!name) {
                    showToast('⚠️ Введите название материала');
                    return;
                }
                
                try {
                    // Check if material already exists
                    const { data: existing } = await supabaseClient
                        .from('materials')
                        .select('id')
                        .ilike('name', name)
                        .eq('category', category)
                        .single();
                    
                    if (existing) {
                        selectMaterial(existing.id, name, category, unit);
                        document.getElementById('manualMaterialContainer').style.display = 'none';
                        showToast('✅ Материал найден в базе');
                        return;
                    }
                    
                    // Create new material
                    const { data: newMaterial, error } = await supabaseClient
                        .from('materials')
                        .insert([{
                            name: name,
                            category: category,
                            default_unit: unit
                        }])
                        .select()
                        .single();
                    
                    if (error) throw error;
                    
                    selectMaterial(newMaterial.id, newMaterial.name, newMaterial.category, newMaterial.default_unit);
                    document.getElementById('manualMaterialContainer').style.display = 'none';
                    showToast('✅ Материал создан в базе');
                    
                } catch (error) {
                    console.error('Error creating material:', error);
                    showToast('❌ Ошибка: ' + error.message);
                }
            };
        };
        
        window.addMaterialToWarehouse = async function(event) {
            event.preventDefault();
            const formData = new FormData(event.target);
            
            const materialId = formData.get('material_id');
            const quantity = parseInt(formData.get('quantity'));
            const location = formData.get('location');
            const notes = formData.get('notes');
            
            console.log('Adding material to warehouse:', { materialId, quantity, location, notes });
            
            try {
                // Проверяем есть ли уже такая запись на складе
                const { data: existing } = await supabaseClient
                    .from('warehouse')
                    .select('*')
                    .eq('material_id', materialId)
                    .single();
                
                if (existing) {
                    // Обновляем количество
                    const { error } = await supabaseClient
                        .from('warehouse')
                        .update({
                            quantity_available: existing.quantity_available + quantity,
                            location: location || existing.location,
                            last_updated: new Date().toISOString()
                        })
                        .eq('material_id', materialId);
                    
                    if (error) throw error;
                    
                    showToast('✅ Материал добавлен на склад');
                } else {
                    // Создаем новую запись
                    const { error } = await supabaseClient
                        .from('warehouse')
                        .insert({
                            material_id: materialId,
                            quantity_available: quantity,
                            quantity_reserved: 0,
                            location: location,
                            last_updated: new Date().toISOString()
                        });
                    
                    if (error) throw error;
                    
                    showToast('✅ Материал добавлен на склад');
                }
                
                document.getElementById('addMaterialModal').remove();
                // Перезагружаем вкладку склада
                await renderWarehouseTab();
                
            } catch (error) {
                console.error('Error adding material:', error);
                showToast('❌ Ошибка: ' + error.message);
            }
        };

        window.finalizeInstallation = async function(event, instId) {
            event.preventDefault();
            const formData = new FormData(event.target);
            
            // Обработка использованных материалов
            const usedMaterials = {};
            for (let [key, value] of formData.entries()) {
                if (key.startsWith('used_inst_material_') && value > 0) {
                    const materialId = key.replace('used_inst_material_', '');
                    usedMaterials[materialId] = parseInt(value);
                }
            }
            
            // Вычитаем использованное со склада
            if (Object.keys(usedMaterials).length > 0) {
                // Загружаем монтаж чтобы получить task_avr_id
                const { data: instData } = await supabaseClient
                    .from('installations')
                    .select('task_avr_id')
                    .eq('id', instId)
                    .single();
                
                let allPRs = [];
                
                // Пробуем найти purchase requests по installation_id
                const { data: prByInst } = await supabaseClient
                    .from('purchase_requests')
                    .select(`
                        id,
                        items:purchase_request_items!fk_pri_purchase_request(
                            id,
                            material_id,
                            quantity
                        )
                    `)
                    .eq('installation_id', instId);
                
                if (prByInst && prByInst.length > 0) {
                    allPRs = allPRs.concat(prByInst);
                }
                
                // Если не нашли - пробуем через task_avr_id
                if (allPRs.length === 0 && instData?.task_avr_id) {
                    const { data: prByAVR } = await supabaseClient
                        .from('purchase_requests')
                        .select(`
                            id,
                            items:purchase_request_items!fk_pri_purchase_request(
                                id,
                                material_id,
                                quantity
                            )
                        `)
                        .eq('task_avr_id', instData.task_avr_id);
                    
                    if (prByAVR && prByAVR.length > 0) {
                        allPRs = allPRs.concat(prByAVR);
                    }
                }
                
                console.log('📦 Found PRs for finalization:', allPRs);
                
                if (allPRs && allPRs.length > 0) {
                    const allItems = allPRs.flatMap(pr => pr.items || []);
                    const prIds = [];
                    
                    for (const [materialId, quantityUsed] of Object.entries(usedMaterials)) {
                        const item = allItems.find(i => String(i.material_id) === String(materialId));
                        if (item) {
                            console.log(`🔵 Installation material ${materialId}: used=${quantityUsed}, requested=${item.quantity}`);
                            
                            // Обновляем quantity_issued в purchase_request_items
                            await supabaseClient
                                .from('purchase_request_items')
                                .update({ quantity_issued: quantityUsed })
                                .eq('id', item.id);
                            
                            // Вычитаем использованное со склада (как в AVR)
                            const { data: existing } = await supabaseClient
                                .from('warehouse')
                                .select('*')
                                .eq('material_id', materialId)
                                .single();
                            
                            const currentQty = existing?.quantity_available || 0;
                            const newQty = currentQty - quantityUsed;
                            
                            console.log(`📦 Warehouse update: ${currentQty} -> ${newQty}`);
                            
                            if (existing) {
                                await supabaseClient
                                    .from('warehouse')
                                    .update({ 
                                        quantity_available: newQty
                                    })
                                    .eq('material_id', materialId);
                            } else {
                                // Если записи нет - создаем с отрицательным значением
                                await supabaseClient
                                    .from('warehouse')
                                    .insert({ 
                                        material_id: materialId, 
                                        quantity_available: -quantityUsed
                                    });
                            }
                            
                            // Собираем ID purchase requests для обновления статуса
                            const pr = allPRs.find(r => r.items?.some(i => i.id === item.id));
                            if (pr && !prIds.includes(pr.id)) {
                                prIds.push(pr.id);
                            }
                        }
                    }
                    
                    // Обновляем статус purchase requests на 'done'
                    for (const prId of prIds) {
                        console.log(`Marking PR ${prId} as done`);
                        await supabaseClient
                            .from('purchase_requests')
                            .update({ status: 'done', updated_at: new Date().toISOString() })
                            .eq('id', prId);
                    }
                    
                    console.log('✅ Installation materials processed');
                } else {
                    console.warn('⚠️ No PRs found for installation materials');
                }
            }
            
            // Если было изменение оборудования - сохраняем в таблицу equipment_changes
            const oldMark = formData.get('old_mark');
            const newMark = formData.get('new_mark');
            
            if (oldMark || newMark) {
                const equipmentChangeData = {
                    task_id: null,  // Для монтажей task_id не используем
                    installation_id: instId,
                    old_value: JSON.stringify({
                        mark: oldMark,
                        model: formData.get('old_model'),
                        serial: formData.get('old_serial'),
                        inventory: formData.get('old_inventory')
                    }),
                    new_value: JSON.stringify({
                        mark: newMark,
                        model: formData.get('new_model'),
                        serial: formData.get('new_serial'),
                        inventory: formData.get('new_inventory')
                    }),
                    changed_by: currentUserProfile.id,
                    changed_at: new Date().toISOString()
                };
                
                console.log('Inserting equipment change for installation:', equipmentChangeData);
                
                const { error: equipError } = await supabaseClient
                    .from('equipment_changes')
                    .insert(equipmentChangeData);
                
                if (equipError) {
                    console.error('Equipment change error:', equipError);
                    showToast('Ошибка сохранения оборудования: ' + equipError.message);
                } else {
                    console.log('✅ Equipment change saved for installation');
                }
            }
            
            // Обновляем статус монтажа
            const updateData = {
                status: 'done',
                updated_at: new Date().toISOString()
            };
            
            const actualDate = formData.get('actual_completion_date');
            if (actualDate) {
                updateData.actual_completion_date = actualDate;
            }
            
            try {
                const { error } = await supabaseClient
                    .from('installations')
                    .update(updateData)
                    .eq('id', instId);
                
                if (error) throw error;
                
                showToast('✅ Монтаж завершен');
                document.getElementById('completeInstallationModal').remove();
                showInstallationDetail(instId);
            } catch (error) {
                showToast('Ошибка: ' + error.message);
            }
        };

        window.saveEditedTask = async function(taskId) {
            const title = document.getElementById('editTaskTitle').value;
            const description = document.getElementById('editTaskDescription').value;
            const project_id = document.getElementById('editTaskProject').value;
            const assignee_id = document.getElementById('editTaskAssignee').value;
            const status = document.getElementById('editTaskStatus').value;

            // Only managers can change due_date
            const isManager = currentUserProfile?.role === 'manager';
            let due_date = null;
            
            if (isManager) {
                const due_date_raw = document.getElementById('editTaskDueDate').value;
                // Use raw value directly without parsing since it's already in YYYY-MM-DD format
                if (due_date_raw && /^\d{4}-\d{2}-\d{2}$/.test(due_date_raw)) {
                    due_date = due_date_raw;
                }
            }

            if (!title) {
                showToast('Введите название задачи');
                return;
            }

            try {
                // Get current task to check if assignee changed
                const { data: currentTask } = await supabaseClient
                    .from('tasks')
                    .select('assignee_id')
                    .eq('id', taskId)
                    .single();
                
                const previousAssigneeId = currentTask?.assignee_id;
                const newAssigneeId = assignee_id || null;
                
                // Build update data object
                const updateData = { 
                    title, 
                    description, 
                    project_id: project_id || null, 
                    assignee_id: assignee_id || null, 
                    status,
                    updated_at: new Date().toISOString() 
                };
                
                // Add due_date only if manager and valid
                if (due_date) {
                    updateData.due_date = due_date;
                }
                
                console.log('Updating task with data:', updateData);
                
                const { error } = await supabaseClient
                    .from('tasks')
                    .update(updateData)
                    .eq('id', taskId);

                if (error) throw error;

                // Send notification if assignee was changed to a new user
                if (newAssigneeId && newAssigneeId !== previousAssigneeId) {
                    const { data: assigneeUser } = await supabaseClient
                        .from('users')
                        .select('id, name')
                        .eq('id', newAssigneeId)
                        .single();
                    
                    const creatorName = currentUserProfile?.name || 'Руководитель';
                    await notifyUserAssignedToTask(taskId, assigneeUser?.id, assigneeUser?.name || 'Исполнитель', creatorName);
                }

                closeModal();
                showToast('Задача обновлена');
                renderTasks(document.getElementById('content'));
            } catch (error) {
                showToast('Ошибка: ' + error.message);
            }
        };

        // ============================================================
        // PURCHASE REQUESTS
        // ============================================================
        async function getPurchaseRequests() {
            const userId = currentUserProfile?.id;
            const isManager = isElevatedUser();

            // Simple query - just get PRs without heavy joins
            let query = supabaseClient
                .from('purchase_requests')
                .select('id, status, created_at, task_id, task_avr_id, installation_id, created_by, comment, receipt_address, received_at')
                .order('created_at', { ascending: false });

            if (!isManager) {
                query = query.eq('created_by', userId);
            }

            const { data, error } = await query;
            if (error) throw error;

            // Early return if no data
            if (!data || data.length === 0) return [];

            // Get unique IDs in one pass
            const taskIds = [...new Set(data?.map(pr => pr.task_id).filter(Boolean) || [])];
            const taskAvrIds = [...new Set(data?.map(pr => pr.task_avr_id).filter(Boolean) || [])];
            const installationIds = [...new Set(data?.map(pr => pr.installation_id).filter(Boolean) || [])];
            const creatorIds = [...new Set(data?.map(pr => pr.created_by).filter(Boolean) || [])];

            // Batch fetch all related data in parallel
            const [tasksData, tasksAvrData, installationsData, usersData] = await Promise.all([
                taskIds.length > 0 ? supabaseClient.from('tasks').select('id, title, project_id').in('id', taskIds) : Promise.resolve({ data: [] }),
                taskAvrIds.length > 0 ? supabaseClient.from('tasks_avr').select('id, title, type, short_id, address_text').in('id', taskAvrIds) : Promise.resolve({ data: [] }),
                installationIds.length > 0 ? supabaseClient.from('installations').select('id, title, project_id').in('id', installationIds) : Promise.resolve({ data: [] }),
                creatorIds.length > 0 ? supabaseClient.from('users').select('id, name').in('id', creatorIds) : Promise.resolve({ data: [] })
            ]);

            // Build lookup maps
            const tasksMap = {};
            const tasksAvrMap = {};
            const installationsMap = {};
            const creatorsMap = {};
            const projectIds = new Set();

            tasksData.data?.forEach(t => {
                tasksMap[t.id] = t;
                if (t.project_id) projectIds.add(t.project_id);
            });
            tasksAvrData.data?.forEach(t => {
                tasksAvrMap[t.id] = t;
            });
            installationsData.data?.forEach(i => {
                installationsMap[i.id] = i;
                if (i.project_id) projectIds.add(i.project_id);
            });
            usersData.data?.forEach(u => creatorsMap[u.id] = u);

            // Fetch projects if needed (single query)
            let projectsMap = {};
            if (projectIds.size > 0) {
                const { data: projects } = await supabaseClient
                    .from('projects')
                    .select('id, name')
                    .in('id', Array.from(projectIds));
                projects?.forEach(p => projectsMap[p.id] = p);
            }

            return (data || []).map(pr => ({
                ...pr,
                users: creatorsMap[pr.created_by] || null,
                tasks: tasksMap[pr.task_id] || null,
                tasks_avr: tasksAvrMap[pr.task_avr_id] || null,
                installations: installationsMap[pr.installation_id] || null,
                project: pr.task_id && tasksMap[pr.task_id] ? projectsMap[tasksMap[pr.task_id].project_id] || null :
                         pr.installation_id && installationsMap[pr.installation_id] ? projectsMap[installationsMap[pr.installation_id].project_id] || null : null
            }));
        }
        window.getPurchaseRequests = getPurchaseRequests;

        window.confirmReceived = async function(prId) {
            const received_at = document.getElementById('receivedDate').value;
            if (!received_at) { showToast('Выберите дату получения'); return; }
            
            try {
                // Получаем позиции заявки
                const { data: items, error: itemsFetchError } = await supabaseClient
                    .from('purchase_request_items')
                    .select('*')
                    .eq('purchase_request_id', prId);
                
                console.log('📦 confirmReceived: items=', items?.length, items, 'error=', itemsFetchError);
                
                if (items && items.length > 0) {
                    // Добавляем каждую позицию на склад (только если есть material_id)
                    for (const item of items) {
                        console.log('📦 Processing item:', item.name, 'material_id:', item.material_id, 'qty:', item.quantity);
                        if (!item.material_id) {
                            console.log('⚠️ Skipping item without material_id:', item.name);
                            continue; // пропускаем позиции без привязки к справочнику
                        }
                        // Проверяем есть ли уже такой материал на складе
                        const { data: existingWarehouse } = await supabaseClient
                            .from('warehouse')
                            .select('id, quantity_available')
                            .eq('material_id', item.material_id)
                            .single();
                        
                        if (existingWarehouse) {
                            // Обновляем количество
                            const { error: wErr } = await supabaseClient
                                .from('warehouse')
                                .update({
                                    quantity_available: (existingWarehouse.quantity_available || 0) + (item.quantity || 0),
                                    last_updated: new Date().toISOString()
                                })
                                .eq('id', existingWarehouse.id);
                            console.log('📦 Warehouse updated:', item.name, '+', item.quantity, wErr || 'ok');
                        } else {
                            // Создаем новую запись на складе
                            const { error: wErr2 } = await supabaseClient
                                .from('warehouse')
                                .insert([{
                                    material_id: item.material_id,
                                    quantity_available: item.quantity || 0,
                                    quantity_reserved: 0,
                                    location: 'Получено из заявки #' + prId.slice(0, 8),
                                    last_updated: new Date().toISOString()
                                }]);
                            console.log('📦 Warehouse inserted:', item.name, item.quantity, wErr2 || 'ok');
                        }
                    }
                }
                
                // Обновляем статус заявки
                const { error } = await supabaseClient
                    .from('purchase_requests')
                    .update({ 
                        status: 'received', 
                        received_at: received_at, 
                        updated_at: new Date().toISOString() 
                    })
                    .eq('id', prId);
                
                if (error) throw error;
                
                closeModal();
                showToast('✅ Заявка получена, материалы добавлены на склад');
                showPRDetailModal(prId);
            } catch (error) { 
                console.error('Receive error:', error);
                showToast('Ошибка: ' + error.message); 
            }
        };

        window.filterPRItems = function() {
            const searchInput = document.getElementById('prItemsSearch');
            if (!searchInput) return;
            
            const filter = searchInput.value.toLowerCase();
            
            // Check in detail view
            const prItemsList = document.getElementById('prItemsList');
            if (prItemsList) {
                const items = prItemsList.querySelectorAll('.pr-item');
                items.forEach(item => {
                    item.style.display = item.textContent.toLowerCase().includes(filter) ? '' : 'none';
                });
            }
            
            // Фильтрация select с материалами — пересобираем options из data-атрибута
            // (option.style.display не работает в большинстве браузеров)
            const materialSelects = document.querySelectorAll('select[id$="Material"]');
            materialSelects.forEach(select => {
                const allOptions = Array.from(select.querySelectorAll('option'));
                allOptions.forEach(option => {
                    if (!option.value) return; // пустой placeholder — не трогаем
                    const text = option.textContent.toLowerCase();
                    option.hidden = filter !== '' && !text.includes(filter);
                });
            });
        };

        // Helper function to parse due_date for storage - fixes the 3:00 AM issue
        function parseDueDate(dateStr) {
            if (!dateStr) return null;
            
            // If date is in YYYY-MM-DDTHH:mm format (from datetime-local input)
            // Extract just the date part YYYY-MM-DD to avoid timezone issues
            if (/^\d{4}-\d{2}-\d{2}T/.test(dateStr)) {
                return dateStr.split('T')[0];
            }
            
            // If already in YYYY-MM-DD format, return as-is
            // This ensures Supabase treats it as a DATE without time component
            if (/^\d{4}-\d{2}-\d{2}$/.test(dateStr)) {
                return dateStr;
            }
            
            return dateStr;
        }

        // Address search function with intelligent autocomplete
        let searchTimeout = null;
        window.searchAddresses = async function(query) {
            clearTimeout(searchTimeout);
            
            if (!query || query.length < 2) {
                document.getElementById('addressSuggestions').innerHTML = '';
                return;
            }
            
            // Debounce search
            searchTimeout = setTimeout(async () => {
                try {
                    // Search in both tables with only needed columns for display
                    const { data: addresses1, error: error1 } = await supabaseClient
                        .from('atss_q1_2026')
                        .select('id_ploshadki, servisnyy_id, adres_razmeshcheniya, rayon, naimenovanie_sk')
                        .ilike('adres_razmeshcheniya', `%${query}%`)
                        .limit(5);
                    
                    const { data: addresses2, error: error2 } = await supabaseClient
                        .from('kasip_azm_q1_2026')
                        .select('id_ploshadki, servisnyy_id, adres_raspolozheniya, ploshchadka, naimenovanie_sk1')
                        .ilike('adres_raspolozheniya', `%${query}%`)
                        .limit(5);
                    
                    if (error1) throw error1;
                    if (error2) throw error2;
                    
                    // Combine results and remove duplicates by address
                    const allAddresses = [...(addresses1 || []), ...(addresses2 || [])];
                    const uniqueAddresses = [];
                    const seenAddresses = new Set();
                    
                    for (const addr of allAddresses) {
                        const addressKey = (addr.adres_razmeshcheniya || addr.adres_raspolozheniya || '').toLowerCase().trim();
                        if (!seenAddresses.has(addressKey)) {
                            seenAddresses.add(addressKey);
                            uniqueAddresses.push(addr);
                        }
                    }
                    
                    const suggestionsDiv = document.getElementById('addressSuggestions');
                    
                    if (!uniqueAddresses || uniqueAddresses.length === 0) {
                        suggestionsDiv.innerHTML = '';
                        return;
                    }
                    
                    let html = '<div style="position:absolute;top:100%;left:0;right:0;background:var(--secondary);border:1px solid var(--border);border-radius:8px;z-index:1000;max-height:300px;overflow-y:auto;box-shadow:0 4px 20px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05)">';
                    
                    uniqueAddresses.forEach((addr, index) => {
                        const addrId = 'addr-' + index + '-' + Date.now();
                        const address = addr.adres_razmeshcheniya || addr.adres_raspolozheniya || '';
                        const skName = addr.naimenovanie_sk || addr.naimenovanie_sk1 || '';
                        const rayon = addr.rayon || addr.ploshchadka || '';
                        const servisnyyId = addr.servisnyy_id || '';
                        
                        html += `
                            <div id="${addrId}" style="padding:12px;cursor:pointer;border-bottom:1px solid var(--border);background:var(--gradient-card);transition:all 0.2s"
                                 onmouseover="this.style.background='rgba(0,217,255,0.15)';this.style.boxShadow='0 0 15px rgba(0,217,255,0.3)'"
                                 onmouseout="this.style.background='var(--gradient-card)';this.style.boxShadow='none'">
                                <div style="font-weight:600;color:var(--accent);font-size:13px;text-shadow:0 0 8px rgba(0,217,255,0.4)">${address}</div>
                                ${skName ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px"><span style="background:rgba(0,217,255,0.15);color:var(--accent);padding:2px 6px;border-radius:4px;font-size:10px;border:1px solid rgba(0,217,255,0.3)">СК</span> ${skName}</div>` : ''}
                                ${rayon ? `<div style="font-size:11px;color:var(--text-muted);margin-top:4px">📍 ${rayon}</div>` : ''}
                                ${servisnyyId ? `<div style="font-size:10px;color:var(--text-muted);margin-top:4px;opacity:0.7">ID: ${servisnyyId}</div>` : ''}
                            </div>
                        `;
                        
                        // Add click handler - load full data on click
                        setTimeout(() => {
                            const element = document.getElementById(addrId);
                            if (element) {
                                element.onclick = async function() {
                                    // Load full data for this address
                                    const fullAddressData = await loadFullAddressData(address);
                                    if (fullAddressData) {
                                        fillInstallationFields(fullAddressData);
                                        document.getElementById('instAddress').value = address;
                                        document.getElementById('addressSuggestions').innerHTML = '';
                                    }
                                };
                            }
                        }, 0);
                    });
                    
                    html += '</div>';
                    suggestionsDiv.innerHTML = html;
                } catch (error) {
                    console.error('Address search error:', error);
                    console.log('Error details:', error.message);
                }
            }, 300);
        };

        window.fillInstallationFields = function(data) {
            console.log('Filling installation fields:', data);
            
            document.getElementById('instIdPloshadki').value = data.id_ploshadki || '';
            document.getElementById('instServisnyyId').value = data.servisnyy_id || '';
            document.getElementById('instRayon').value = data.rayon || '';
            
            // Clear previous SK rows
            const container = document.getElementById('skRowsContainer');

                container.innerHTML = '';
            }
            
            // Collect all SKs from the address

            // Check for ATSS format
            // Первый СК: id_sk / naimenovanie_sk (без цифры)
            // Остальные: id_sk2..id_sk6
            const atssSlots = [
                { id: data.id_sk,  naim: data.naimenovanie_sk,  st: data.status_oborudovaniya,  tip: data.tip_sk_po_dogovoru,  idx: 1 },
                { id: data.id_sk2, naim: data.naimenovanie_sk2, st: data.status_oborudovaniya2, tip: data.tip_sk_po_dogovoru2, idx: 2 },
                { id: data.id_sk3, naim: data.naimenovanie_sk3, st: data.status_oborudovaniya3, tip: data.tip_sk_po_dogovoru3, idx: 3 },
                { id: data.id_sk4, naim: data.naimenovanie_sk4, st: data.status_oborudovaniya4, tip: data.tip_sk_po_dogovoru4, idx: 4 },
                { id: data.id_sk5, naim: data.naimenovanie_sk5, st: data.status_oborudovaniya5, tip: data.tip_sk_po_dogovoru5, idx: 5 },
                { id: data.id_sk6, naim: data.naimenovanie_sk6, st: data.status_oborudovaniya6, tip: data.tip_sk_po_dogovoru6, idx: 6 },

                    const idCond = data[`id_konditsionera${i}`];
                    const naimenovanie = data[`naimenovanie_sk${i}`];
                    const status = data[`status_sk${i}`];

                            tip_sk_po_dogovoru: tip,

                if (_fb_st) _fb_st.value = data.status_oborudovaniya || data.status_oborudovaniya1 || data.status_sk1 || '';

            } else {

        window.createInstallation = async function() {
            const title = document.getElementById('instTitle').value;
            const description = document.getElementById('instDescription').value;
            const project_id = document.getElementById('instProject').value;
            const assignee_id = document.getElementById('instAssignee').value;
            const address = document.getElementById('instAddress').value;
            const scheduled_at = document.getElementById('instScheduledAt').value;
            const status = document.getElementById('instStatus').value;
            
            // Get additional fields from quarter_2026
            const id_ploshadki = document.getElementById('instIdPloshadki')?.value;
            const servisnyy_id = document.getElementById('instServisnyyId')?.value;
            const rayon = document.getElementById('instRayon')?.value;
            
            // Get SK fields from dynamic rows (all 6 SKs)
            const skData = {};
            for (let i = 0; i < 6; i++) {
                const idSk = document.getElementById(`sk_id_${i}`)?.value;
                const naimenovanie = document.getElementById(`sk_name_${i}`)?.value;
                const status = document.getElementById(`sk_status_${i}`)?.value;
                const tip = document.getElementById(`sk_tip_${i}`)?.value;
                
              if (idSk || naimenovanie) {
                   skData[`id_sk${i+1}`] = idSk ? parseInt(idSk) : null;
                   skData[`naimenovanie_sk${i+1}`] = naimenovanie || null;
                   skData[`status_oborudovaniya${i+1}`] = status || null;
                   skData[`tip_sk_po_dogovoru${i+1}`] = tip ? tip.toString() : null;
               }
            }
            
           // Fallback to old fields if no dynamic rows
          if (Object.keys(skData).length === 0) {
               const id_sk1 = document.getElementById('instIdSk')?.value;
               const naimenovanie_sk1 = document.getElementById('instNaimenovanieSk')?.value;
               const status_oborudovaniya1 = document.getElementById('instStatusOborudovaniya')?.value;
               const tip_sk_po_dogovoru1 = document.getElementById('instTipSkPoDogovoru')?.value;
               
             if (id_sk1 || naimenovanie_sk1) {
                  skData.id_sk1 = id_sk1 ? parseInt(id_sk1) : null;
                  skData.naimenovanie_sk1 = naimenovanie_sk1 || null;
                  skData.status_oborudovaniya1 = status_oborudovaniya1 || null;
                  skData.tip_sk_po_dogovoru1 = tip_sk_po_dogovoru1 ? tip_sk_po_dogovoru1.toString() : null;
              }
           }
            
            const planovaya_data_str = document.getElementById('instPlanovayaData')?.value;
            
            if (!title) {
                showToast('Введите название монтажа');
                return;
            }
            
            try {
                const installationData = {
                    title,
                    description,
                    project_id: project_id || null,
                    assignee_id: assignee_id || null,
                    address,
                    scheduled_at: scheduled_at || null,
                    status,
                    created_by: currentUserProfile?.id
                };
                
                // Add quarter_2026 fields if they exist
                if (id_ploshadki) installationData.id_ploshadki = parseInt(id_ploshadki);
                if (servisnyy_id) installationData.servisnyy_id = servisnyy_id;
                if (rayon) installationData.rayon = rayon;
                
                // Add all SK data from dynamic rows
                Object.assign(installationData, skData);
                if (planovaya_data_str && planovaya_data_str.trim() !== '') {
                    // Parse Russian date format DD.MM.YYYY
                   const parts = planovaya_data_str.split('.');
                  if (parts.length === 3) {
                        const day = parseInt(parts[0], 10);
                       const month = parseInt(parts[1], 10) - 1; // months are 0-indexed in JS
                       const year = parseInt(parts[2], 10);
                       const planovaya_date = new Date(year, month, day);
                       
                     if (!isNaN(planovaya_date.getTime())) {
                            // Convert to Unix timestamp (INTEGER)
                            installationData.planovaya_data_1_kv_2026 = Math.floor(planovaya_date.getTime() / 1000);
                        }
                    }
                }
                
                console.log('Creating installation:', installationData);
                
                const { data, error } = await supabaseClient
                    .from('installations')
                    .insert([installationData])
                    .select();

                console.log('Installation created:', data);
                
                // Send notification if assignee was selected

                        .from('users')
                        .select('name')
                        .eq('id', assignee_id)
                        .single();
                    
                    const creatorName = currentUserProfile?.name || 'Руководитель';
                    await notifyUserAssignedToTask(title, assigneeUser?.name || 'Исполнитель', creatorName);
                }
                
                closeModal();
                showToast('Монтаж создан');
                
                // Refresh current view
                if (currentView === 'installations') {
                    await renderInstallations(document.getElementById('content'));
                } else if (currentView === 'projects' && project_id) {
                    await showProjectDetail(project_id);

            } catch (error) {
                console.error('Installation creation error:', error);
                showToast('Ошибка: ' + error.message);
            }

        window.createPR = async function() {
            const items = [];

            // Собираем ВСЕ существующие Material-поля — независимо от нумерации
            const allMaterialInputs = document.querySelectorAll('[id^="prItem"][id$="Material"]');
            
            allMaterialInputs.forEach(materialHidden => {
                // Извлекаем номер из id: prItem5Material → 5
                const num = materialHidden.id.replace('prItem', '').replace('Material', '');
                const searchInput = document.getElementById('prItem' + num + 'Search');
                const nameInput   = document.getElementById('prItem' + num + 'Name');
                const materialId  = materialHidden.value?.trim() || null;
                const mats        = window._prMaterials || [];
                const foundMat    = materialId ? mats.find(m => m.id === materialId) : null;
                const nameFromSearch = searchInput?.value?.split(' (')[0]?.trim() || '';
                const name = nameInput?.value?.trim() || (foundMat ? foundMat.name : nameFromSearch);

                if (name || materialId) {
                    items.push({
                        name: name || (foundMat ? foundMat.name : ''),
                        quantity: parseFloat(document.getElementById('prItem' + num + 'Qty')?.value) || 1,
                        unit: document.getElementById('prItem' + num + 'Unit')?.value || 'pcs',
                        note: document.getElementById('prItem' + num + 'Note')?.value || null,
                        material_id: materialId || null
                    });
                }
            });
            
            console.log('📝 createPR: found', allMaterialInputs.length, 'inputs, collected', items.length, 'items');
            
            if (items.length === 0) {
                showToast('Добавьте хотя бы одну позицию');
                return;
            }
            
            // Проверяем наличие материалов на складе
            let needsOrder = false;
            for (const item of items) {
                if (item.material_id) {
                    const { data: warehouse } = await supabaseClient
                        .from('warehouse')
                        .select('quantity_available')
                        .eq('material_id', item.material_id)
                        .single();
                    
                    const available = warehouse?.quantity_available || 0;
                    if (available < item.quantity) {
                        needsOrder = true;
                        break;
                    }
                } else {
                    // Если материал не выбран из справочника - считаем что нужно заказать
                    needsOrder = true;
                }
            }
            
            try {
                // Create the PR
                // needsOrder=true → материала нет на складе → нужно согласование (pending)
                // needsOrder=false → всё есть на складе → сразу готов к получению
                const prData = {
                    status: needsOrder ? 'pending' : 'ready_for_receipt',
                    created_by: currentUserProfile?.id
                };
                
                if (!needsOrder) {
                    prData.receipt_address = 'Склад офис';
                }
                
                if (prType === 'avr' && prRefId) {
                    // Для задач АВР используем task_avr_id
                    const uuidPattern = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
                    if (!uuidPattern.test(prRefId)) {
                        throw new Error('Неверный формат ID задачи АВР');
                    }
                    prData.task_avr_id = prRefId;
                } else if (prType === 'task' && prRefId) {
                    // Проверка UUID формата
                    const uuidPattern = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
                    if (!uuidPattern.test(prRefId)) {
                        throw new Error('Неверный формат ID задачи');
                    }
                    // Используем task_avr_id для задач из tasks_avr
                    prData.task_avr_id = prRefId;
                } else if (prType === 'installation' && prRefId) {
                    const uuidPattern = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i;
                    if (!uuidPattern.test(prRefId)) {
                        throw new Error('Неверный формат ID монтажа');
                    }
                    prData.installation_id = prRefId;
                }
                
                console.log('🔵 Creating PR:', { prType, prRefId, prData });
                
                const { data: pr, error: prError } = await supabaseClient
                    .from('purchase_requests')
                    .insert([prData])
                    .select()
                    .single();
                
                if (prError) {
                    console.error('PR creation error:', prError);
                    throw prError;
                }
                
                console.log('✅ PR created:', pr);
                
                // Вставляем позиции (реальная схема: purchase_request_id, name, quantity, unit, note, material_id)
                const itemsWithPRId = items.map(item => ({
                    purchase_request_id: pr.id,
                    name: item.name || '',
                    quantity: item.quantity || 1,
                    unit: item.unit || 'pcs',
                    note: item.note || null,
                    material_id: item.material_id || null
                }));
                
                const { error: itemsError } = await supabaseClient
                    .from('purchase_request_items')
                    .insert(itemsWithPRId);
                
                if (itemsError) {
                    console.error('Items error:', JSON.stringify(itemsError));
                    throw itemsError;
                }
                
                // Добавляем новые материалы в справочник materials если их там нет
                for (const item of items) {
                    if (!item.material_id && item.name) {
                        // Проверяем есть ли такой материал уже
                        const { data: existingMaterial } = await supabaseClient
                            .from('materials')
                            .select('id')
                            .eq('name', item.name)
                            .single();
                        
                        if (!existingMaterial) {
                            // Добавляем новый материал
                            const { error: matError } = await supabaseClient
                                .from('materials')
                                .insert([{
                                    name: item.name,
                                    category: 'Общие',
                                    default_unit: item.unit || 'pcs',
                                    is_optional: false
                                }]);
                            
                            if (matError) {
                                console.error('Material creation error:', matError);
                            } else {
                                console.log('✅ Material added to catalog:', item.name);
                            }
                        }
                    }
                }
                
                console.log('✅ PR created successfully');
                
                // Закрываем модалку
                const modal = document.getElementById('createPRModal');
                if (modal) modal.remove();
                
                if (needsOrder) {
                    showToast('📋 Заявка отправлена на согласование');
                } else {
                    showToast('✅ Заявка создана — материал есть на складе');
                }
                
                // Обновляем текущий вид
                if (currentView === 'avr') {
                    await renderAVRTab();
                } else if (currentView === 'purchaseRequests') {
                    renderPurchaseRequests(document.getElementById('content'));
                } else if (currentView === 'tasks' && prType === 'task') {
                    showTaskDetail(prRefId);
                } else if (currentView === 'installations' && prType === 'installation') {
                    showInstallationDetail(prRefId);
                }
            } catch (error) {
                console.error('Create PR error:', error);
                showToast('Ошибка: ' + (error.message || error));
            }
        };

        // ============================================================
        // CALENDAR
        // ============================================================
        async function renderCalendar(content) {
            const year = calendarDate.getFullYear();
            const month = calendarDate.getMonth();
            
            const monthNames = ['Январь', 'Февраль', 'Март', 'Апрель', 'Май', 'Июнь', 
                              'Июль', 'Август', 'Сентябрь', 'Октябрь', 'Ноябрь', 'Декабрь'];
            
            const firstDay = new Date(year, month, 1);
            const lastDay = new Date(year, month + 1, 0);
            const startDay = firstDay.getDay() || 7;
            const totalDays = lastDay.getDate();
            
            // Get tasks and installations for this month
            const startDate = new Date(year, month, 1).toISOString();
            const endDate = new Date(year, month + 1, 0).toISOString();
            
            // Get all users for filter
            const { data: users } = await supabaseClient.from('users').select('id, name');
            
            // Инженер видит только своё
            const engineerMode = isEngineer();
            const engineerId = engineerMode ? currentUserProfile?.id : null;
            
            // Get tasks and installations for the month
            let tasksQuery = supabaseClient.from('tasks').select('id, title, status, due_date, assignee_id')
                .gte('due_date', startDate).lte('due_date', endDate);
            let instsQuery = supabaseClient.from('installations').select('id, title, status, scheduled_at, assignee_id')
                .gte('scheduled_at', startDate).lte('scheduled_at', endDate);
            let avrTasksQuery = supabaseClient.from('tasks_avr').select('id, title, type, status, date_from, date_to, executor_id')
                .lte('date_from', endDate).gte('date_to', startDate);
            
            if (engineerMode) {
                tasksQuery = tasksQuery.eq('assignee_id', engineerId);
                instsQuery = instsQuery.eq('assignee_id', engineerId);
                avrTasksQuery = avrTasksQuery.eq('executor_id', engineerId);
            }
            const [monthTasks, monthInstallations, monthAVRTasks] = await Promise.all([tasksQuery, instsQuery, avrTasksQuery]);
            
            // Apply executor filter if selected
            let filteredTasks = monthTasks.data;
            let filteredInstallations = monthInstallations.data;
            let filteredAVRTasks = monthAVRTasks.data;
            
            // Инженер: фильтруем по своему ID, игнорируем filer-селект
            if (engineerMode) {
                filteredTasks = filteredTasks?.filter(t => t.assignee_id === engineerId) || [];
                filteredInstallations = filteredInstallations?.filter(i => i.assignee_id === engineerId) || [];
                filteredAVRTasks = filteredAVRTasks?.filter(avr => avr.executor_id === engineerId) || [];
            } else {
                // Фильтр по исполнителю для остальных
                const currentFilter = document.getElementById('calendarExecutorFilter')?.value || 'all';
                if (currentFilter !== 'all') {
                    filteredTasks = monthTasks.data?.filter(t => t.assignee_id === currentFilter) || [];
                    filteredInstallations = monthInstallations.data?.filter(i => i.assignee_id === currentFilter) || [];
                    filteredAVRTasks = monthAVRTasks.data?.filter(avr => avr.executor_id === currentFilter) || [];
                }
            }
            
            let html = `
                <h2 style="margin-bottom: 16px">Календарь</h2>
                <div class="calendar">
                    <div class="calendar-header">
                        <button class="calendar-nav" onclick="changeMonth(-1)">◀</button>
                        <div class="calendar-month">${monthNames[month]} ${year}</div>
                        <button class="calendar-nav" onclick="changeMonth(1)">▶</button>
                    </div>
                    <div class="calendar-weekdays">
                        <div class="calendar-weekday">Пн</div>
                        <div class="calendar-weekday">Вт</div>
                        <div class="calendar-weekday">Ср</div>
                        <div class="calendar-weekday">Чт</div>
                        <div class="calendar-weekday">Пт</div>
                        <div class="calendar-weekday">Сб</div>
                        <div class="calendar-weekday">Вс</div>
                    </div>
                    <div class="calendar-days">
            `;
            
            // Previous month days
            const prevMonthDays = new Date(year, month, 0).getDate();
            for (let i = startDay - 1; i > 0; i--) {
                html += `<div class="calendar-day other-month">${prevMonthDays - i + 1}</div>`;
            }
            
            // Current month days
            const today = new Date();
            for (let day = 1; day <= totalDays; day++) {
                const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;
                const isToday = today.getDate() === day && today.getMonth() === month && today.getFullYear() === year;
                
                // Check for items on this day
                let dayTasks = filteredTasks?.filter(t => t.due_date && t.due_date.startsWith(dateStr)) || [];
                let dayInstallations = filteredInstallations?.filter(i => i.scheduled_at && i.scheduled_at.startsWith(dateStr)) || [];
                let dayAVRTasks = filteredAVRTasks?.filter(avr => {
                    const dateFrom = avr.date_from ? avr.date_from.split('T')[0] : '';
                    const dateTo = avr.date_to ? avr.date_to.split('T')[0] : '';
                    return dateFrom <= dateStr && dateTo >= dateStr;
                }) || [];
                const hasItems = dayTasks.length > 0 || dayInstallations.length > 0 || dayAVRTasks.length > 0;
                
                html += `
                    <div class="calendar-day ${isToday ? 'today' : ''} ${hasItems ? 'has-items' : ''}" onclick="showCalendarDay('${dateStr}')">
                        ${day}
                        ${hasItems ? `<div class="calendar-day-items">${dayTasks.length + dayInstallations.length + dayAVRTasks.length}</div>` : ''}
                    </div>
                `;
            }
            
            // Next month days
            const remainingDays = 42 - (startDay - 1 + totalDays);
            for (let day = 1; day <= remainingDays; day++) {
                html += `<div class="calendar-day other-month">${day}</div>`;
            }
            
            html += `
                    </div>
                </div>
                
                <!-- Filter by executor - only for non-engineers -->
                ${!engineerMode ? `
                <div class="card" style="margin-top: 16px;">
                    <h3 class="section-title">Фильтр по исполнителю</h3>
                    <select id="calendarExecutorFilter" class="form-group" onchange="applyCalendarExecutorFilter()" style="width: 100%">
                        <option value="all">Все исполнители</option>
                        ${(users || []).map(u => `<option value="${u.id}">${u.name}</option>`).join('')}
                    </select>
                </div>` : ''}
            `;
            
            content.innerHTML = html;
        }

            calendarDate.setMonth(calendarDate.getMonth() + delta);

        };
